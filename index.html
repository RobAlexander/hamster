<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0804; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Palatino Linotype', Palatino, serif; }
    #canvas-container { position: fixed; inset: 0; }
    #ui-overlay { position: fixed; inset: 0; pointer-events: none; }

    #food-tray {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      pointer-events: auto; display: none; z-index: 100;
    }
    #food-item {
      width: 68px; height: 68px;
      background: rgba(30,18,6,0.88);
      border: 2px solid #8B7355; border-radius: 50%;
      cursor: grab; display: flex; align-items: center; justify-content: center;
      font-size: 34px; user-select: none; touch-action: none;
      transition: transform 0.15s;
    }
    #food-item:hover { transform: scale(1.08); }
    #food-item:active { cursor: grabbing; }

    /* ── Bin (item disposal) ── */
    #bin-zone {
      position: fixed; bottom: 32px; right: 82px;
      width: 44px; height: 44px; margin: 5px 0;
      background: rgba(16,8,4,0.75);
      border: 1px solid #4a3020; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: default; color: #c8a882;
      pointer-events: auto; z-index: 100;
      transition: background 0.18s, border-color 0.18s, transform 0.18s, bottom 0.2s ease;
      user-select: none;
    }
    #bin-zone.bin-live  { border-color: #7a5030; cursor: crosshair; }
    #bin-zone.bin-hover { background: rgba(100,30,10,0.85); border-color: #cc4422; transform: scale(1.15); }
    body.console-open #bin-zone,
    body.console-open #food-pile { bottom: 220px; }

    /* ── Always-visible food pile ── */
    #food-pile {
      position: fixed; bottom: 32px; right: 16px;
      pointer-events: auto; z-index: 100;
      transition: bottom 0.2s ease;
    }
    #food-pile-icon {
      width: 54px; height: 54px;
      background: rgba(20,12,4,0.80);
      border: 1px solid #6a5038; border-radius: 50%;
      cursor: grab; display: flex; align-items: center; justify-content: center;
      font-size: 28px; user-select: none; touch-action: none;
      transition: transform 0.12s, opacity 0.3s;
    }
    #food-pile-icon:hover { transform: scale(1.12); }
    #food-pile-icon:active { cursor: grabbing; transform: scale(0.96); }
    #food-pile-icon.unavailable { opacity: 0.28; cursor: not-allowed; }

    #status-dot {
      position: fixed; bottom: 10px; left: 18px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a2a1a; pointer-events: none;
      transition: background 0.5s;
    }

    /* ── Dev Console ── */
    #dev-console {
      position: fixed; bottom: 0; left: 0; right: 0; height: 210px;
      background: rgba(5,5,5,0.92); border-top: 1px solid #333;
      display: none; flex-direction: column; z-index: 9999;
      font-family: 'Courier New', monospace; font-size: 12px;
      pointer-events: auto;
    }
    #dev-console.open { display: flex; }
    #dev-output {
      flex: 1; overflow-y: auto; padding: 6px 10px;
      white-space: pre-wrap; line-height: 1.5;
    }
    #dev-output .err  { color: #ff6666; }
    #dev-output .ok   { color: #66ff88; }
    #dev-output .info { color: #aaaaff; }
    #dev-output .cmd  { color: #88ff88; }
    #dev-output .muted{ color: #666666; }
    #dev-input-row {
      display: flex; align-items: center;
      border-top: 1px solid #2a2a2a; padding: 5px 10px; flex-shrink: 0;
    }
    #dev-prompt { color: #55cc55; margin-right: 6px; user-select: none; }
    #dev-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #ccffcc; font-family: inherit; font-size: 12px; caret-color: #55cc55;
    }
    #dev-toggle-hint {
      display: none;
    }

    /* ── Name Prompt ── */
    #name-prompt {
      position: fixed; inset: 0;
      background: rgba(5,3,1,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
    }
    #name-prompt.hidden { display: none; }
    #name-prompt-box {
      background: rgba(18,10,3,0.98); border: 1px solid #7a6040;
      padding: 38px 48px; text-align: center; max-width: 360px; width: 90%;
    }
    #name-prompt-box p { color: #c8b898; font-size: 15px; line-height: 1.7; margin-bottom: 26px; }
    #name-input {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid #7a6040;
      color: #e8d8b8; font-family: 'Palatino Linotype', Palatino, serif;
      font-size: 18px; padding: 6px 4px; margin-bottom: 26px;
      outline: none; text-align: center;
    }
    #name-submit {
      background: transparent; border: 1px solid #7a6040; color: #c8b898;
      font-family: 'Palatino Linotype', Palatino, serif; font-size: 14px;
      padding: 9px 28px; cursor: pointer; letter-spacing: 0.06em;
    }
    #name-submit:hover { background: rgba(122,96,64,0.18); }

    /* ── Settings Menu ── */
    #menu-btn {
      position: fixed; top: 14px; right: 16px;
      background: transparent; border: none; color: #3a2810;
      font-size: 17px; cursor: pointer; z-index: 100;
      pointer-events: auto; padding: 3px; line-height: 1;
      transition: color 0.2s;
    }
    #menu-btn:hover { color: #8a6840; }
    #menu-panel {
      position: fixed; inset: 0;
      background: rgba(5,3,1,0.88);
      display: none; align-items: center; justify-content: center;
      z-index: 400;
    }
    #menu-panel.open { display: flex; }
    #menu-inner {
      background: rgba(18,10,3,0.98); border: 1px solid #7a6040;
      padding: 32px 40px; min-width: 280px; max-width: 340px; width: 90%;
    }
    #menu-inner h3 {
      color: #7a6040; font-size: 11px; letter-spacing: 0.14em;
      text-transform: uppercase; margin-bottom: 26px; font-weight: normal;
    }
    .menu-section { margin-bottom: 22px; }
    .menu-section label {
      display: block; color: #5a4428; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
    }
    .menu-row { display: flex; gap: 8px; align-items: flex-end; }
    #menu-name-input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid #5a4030; color: #e8d8b8;
      font-family: 'Palatino Linotype', Palatino, serif;
      font-size: 15px; padding: 4px 2px; outline: none;
    }
    #menu-food {
      width: 100%; background: rgba(10,6,2,0.95); border: 1px solid #5a4030;
      color: #c8b898; font-family: 'Palatino Linotype', Palatino, serif;
      font-size: 14px; padding: 7px 8px; outline: none; cursor: pointer;
    }
    #menu-food option { background: #120802; }
    .menu-btn-row { display: flex; gap: 10px; margin-top: 6px; }
    .menu-action-btn {
      background: transparent; border: 1px solid #5a4030; color: #b89870;
      font-family: 'Palatino Linotype', Palatino, serif; font-size: 13px;
      padding: 7px 18px; cursor: pointer; letter-spacing: 0.04em;
    }
    .menu-action-btn:hover { background: rgba(90,64,48,0.22); }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-overlay">
    <div id="food-tray"><div id="food-item"></div></div>
    <div id="bin-zone" title="Drop here to discard">🗑</div>
    <div id="food-pile"><div id="food-pile-icon"></div></div>
    <div id="status-dot"></div>
  </div>

  <button id="menu-btn" title="Settings">⚙</button>
  <div id="menu-panel">
    <div id="menu-inner">
      <h3>Settings</h3>
      <div class="menu-section">
        <label>Your name</label>
        <div class="menu-row">
          <input id="menu-name-input" type="text" maxlength="32" autocomplete="off" spellcheck="false">
          <button class="menu-action-btn" id="menu-name-save">Save</button>
        </div>
      </div>
      <div class="menu-section">
        <label>Food offering</label>
        <select id="menu-food">
          <option value="sunflower seeds">🌻  sunflower seeds</option>
          <option value="millet">🌾  millet</option>
          <option value="dried cranberries">🍒  dried cranberries</option>
          <option value="a small walnut">🌰  a small walnut</option>
          <option value="pellets of uncertain origin">⬛  pellets of uncertain origin</option>
        </select>
      </div>
      <div class="menu-btn-row">
        <button class="menu-action-btn" id="menu-close">Close</button>
        <button class="menu-action-btn" id="menu-clear" style="color:#885544;margin-left:auto">Reset data…</button>
      </div>
      <div id="menu-clear-confirm" style="display:none;margin-top:18px;border-top:1px solid #3a2010;padding-top:16px">
        <p style="color:#7a4030;font-size:12px;letter-spacing:0.06em;margin-bottom:12px;text-align:center">All data will be erased. Are you certain?</p>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="menu-action-btn" id="menu-clear-yes" style="color:#cc4422">Yes, reset</button>
          <button class="menu-action-btn" id="menu-clear-no">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="name-prompt" class="hidden">
    <div id="name-prompt-box">
      <p>The hamster requires your name.</p>
      <input id="name-input" type="text" maxlength="32" placeholder="your name"
             autocomplete="off" spellcheck="false">
      <br>
      <button id="name-submit">Proceed</button>
    </div>
  </div>

  <div id="dev-console">
    <div id="dev-output"></div>
    <div id="dev-input-row">
      <span id="dev-prompt">hamster&gt;&nbsp;</span>
      <input id="dev-input" type="text" autocomplete="off" spellcheck="false" placeholder="type help">
    </div>
  </div>
  <div id="dev-toggle-hint">` — dev console</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
  'use strict';

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 1 — Constants
  // ═══════════════════════════════════════════════════════════════════════════

  // TIME_SCALE: 1 = real time (hunger every ~12 real hours).
  // Set to e.g. 720 to test (1 real second = 12 game minutes → hunger in ~60s).
  let TIME_SCALE = 1;

  // ── Pace system ──────────────────────────────────────────────────────────────
  // paceConsole: manually set from dev console, normally 1.0
  // paceAuto:    automatic boost (e.g. on state restore), decays from initial → 1.0 over time
  // Effective scheduler speed = TIME_SCALE * paceConsole * paceAuto
  let paceConsole       = 1.0;
  let _paceAutoInitial  = 1.0;    // 1.0 = no boost; returning users start at 4.0
  let _paceAutoStart    = 0;      // Date.now() when auto-pace began
  const PACE_AUTO_DECAY = 3600;   // real seconds to decay from initial → 1.0

  function paceAuto() {
    const elapsed = (Date.now() - _paceAutoStart) / 1000;
    const t = Math.max(0, 1 - elapsed / PACE_AUTO_DECAY);
    return 1.0 + (_paceAutoInitial - 1.0) * t;  // lerp from initial → 1.0
  }
  function pace() { return paceConsole * paceAuto(); }

  // ── Uptime tracking ──────────────────────────────────────────────────────────
  const _sessionStart = Date.now();
  let   _savedUptimeSec = 0;   // loaded from localStorage; updated periodically

  function sessionSec()  { return (Date.now() - _sessionStart) / 1000; }
  function totalSec()    { return _savedUptimeSec + sessionSec(); }

  function _fmtTime(sec) {
    sec = Math.floor(sec);
    const d = Math.floor(sec / 86400), h = Math.floor((sec % 86400) / 3600),
          m = Math.floor((sec % 3600) / 60), s = sec % 60;
    if (d > 0) return `${d}d ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m ${s}s`;
    return `${m}m ${s}s`;
  }

  function _saveUptime() {
    localStorage.setItem('hamster_total_uptime', Math.floor(totalSec()));
  }

  const WALK_SPEED = 0.7;   // units/sec when wandering
  const JERK_SPEED = 1.5;   // units/sec when worried

  const STATES = Object.freeze({
    IDLE: 'idle', WANDERING: 'wandering', OUT_OF_SHOT: 'out_of_shot',
    LOOKING: 'looking', HUNGRY: 'hungry', EATING: 'eating',
    SLEEPING: 'sleeping', NAP: 'nap', WORRIED: 'worried',
    PLAY_DEAD: 'play_dead', POOPING: 'pooping',
    STUDYING_BUG: 'studying_bug', EATING_BUG: 'eating_bug',
    LOTION: 'lotion', SUBSTANCE: 'substance',
    DIGGING: 'digging', GIFT_OFFERING: 'gift_offering',
  });

  const FOOD_ICONS = {
    'sunflower seeds':          '🌻',
    'millet':                   '🌾',
    'dried cranberries':        '🍒',
    'a small walnut':           '🌰',
    'pellets of uncertain origin': '⬛',
  };

  // Camera: default + worried room angles
  const DEFAULT_CAM_POS    = new THREE.Vector3(0, 3, 6);
  const DEFAULT_CAM_LOOKAT = new THREE.Vector3(0, 0.5, 0);
  const ROOM_ANGLES = [
    { pos: new THREE.Vector3( 4.5, 2.5, 4), lookAt: new THREE.Vector3(0, 0.5, 0) },
    { pos: new THREE.Vector3(-4.5, 2.5, 4), lookAt: new THREE.Vector3(0, 0.5, 0) },
    { pos: new THREE.Vector3( 0,   6.5, 3), lookAt: new THREE.Vector3(0, 0, 0)   },
    { pos: new THREE.Vector3( 0,   1.5, 9), lookAt: new THREE.Vector3(0, 0.5, 0) },
    { pos: new THREE.Vector3( 2,   2,   7), lookAt: new THREE.Vector3(0, 0.5, 0) },
  ];

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 2 — App state (minimal; expanded in Phase 4)
  // ═══════════════════════════════════════════════════════════════════════════

  const appState = {
    userName:   'Friend',
    foodType:   'sunflower seeds',
    firstRun:   null,
    milestones: [],
    stats: { feedCount: 0, lotionCount: 0, substanceCount: 0, poopPickedUp: 0 },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 3 — Globals
  // ═══════════════════════════════════════════════════════════════════════════

  let renderer, scene, camera;
  let hamster = {};
  let eyeTrackingEnabled = true;

  const mouseNDC   = new THREE.Vector2(0, 0);
  const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const raycaster  = new THREE.Raycaster();

  // Animation globals
  let totalTime  = 0;
  let lastTS     = 0;
  let blinkTimer = 2 + Math.random() * 3;
  let blinkPhase = 'open';
  let blinkT     = 0;
  let walkTime   = 0;
  let isWalking  = false;

  // Wobble (play dead click effect)
  let wobbleActive = false;
  let wobbleT      = 0;

  // Camera lerp targets
  let camTargetPos    = DEFAULT_CAM_POS.clone();
  let camTargetLookAt = DEFAULT_CAM_LOOKAT.clone();
  let camCurrentLookAt = DEFAULT_CAM_LOOKAT.clone();

  // Wander system
  let wanderPath  = [];
  let wanderIdx   = 0;

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 3.5 — Persistence
  // ═══════════════════════════════════════════════════════════════════════════

  const Persist = {
    load() {
      const name = localStorage.getItem('hamster_name');
      if (name) appState.userName = name;
      appState.firstRun   = localStorage.getItem('hamster_first_run');
      appState.milestones = JSON.parse(localStorage.getItem('hamster_milestones') || '[]');
      const food = localStorage.getItem('hamster_food');
      if (food && FOOD_ICONS[food]) appState.foodType = food;
      _savedUptimeSec = parseFloat(localStorage.getItem('hamster_total_uptime') || '0');
      const stats = JSON.parse(localStorage.getItem('hamster_stats') || 'null');
      if (stats) Object.assign(appState.stats, stats);
    },

    saveStats() {
      localStorage.setItem('hamster_stats', JSON.stringify(appState.stats));
    },

    savePosition() {
      const p = hamster.group.position, r = hamster.group.rotation;
      localStorage.setItem('hamster_pos', JSON.stringify({ x: p.x, z: p.z, ry: r.y }));
    },

    loadPosition() {
      try {
        const d = JSON.parse(localStorage.getItem('hamster_pos') || 'null');
        if (d) { hamster.group.position.set(d.x, 0, d.z); hamster.group.rotation.y = d.ry; }
      } catch (e) { /* ignore */ }
    },

    saveName(name) {
      appState.userName = name || 'Friend';
      localStorage.setItem('hamster_name', appState.userName);
      if (!appState.firstRun) {
        appState.firstRun = new Date().toISOString();
        localStorage.setItem('hamster_first_run', appState.firstRun);
      }
    },

    markMilestone(id) {
      if (appState.milestones.includes(id)) return false;
      appState.milestones.push(id);
      localStorage.setItem('hamster_milestones', JSON.stringify(appState.milestones));
      return true;
    },

    hasMilestone(id) { return appState.milestones.includes(id); },

    daysSinceFirstRun() {
      if (!appState.firstRun) return 0;
      return (Date.now() - new Date(appState.firstRun).getTime()) / 86400000;
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 4 — State Machine
  // ═══════════════════════════════════════════════════════════════════════════

  const SM = {
    current: STATES.IDLE,
    timer:   0,
    data:    {},

    transition(newState, data = {}) {
      onExitState(this.current);
      this.current = newState;
      this.data    = { ...data };
      this.timer   = 0;
      onEnterState(newState, data);
      updateFoodTray();
      updateFoodPile();
      updateStatusDot();
    },

    update(delta) {
      this.timer += delta;
      updateCurrentState(this.current, delta, this.timer);
    },
  };

  // ─── State entry ─────────────────────────────────────────────────────────────
  function onEnterState(state, data) {
    isWalking = false;
    switch (state) {
      case STATES.LOOKING:
        eyeTrackingEnabled = true;
        // Hamster turns to face camera
        hamster.head.rotation.y = THREE.MathUtils.lerp(hamster.head.rotation.y, 0, 0.5);
        break;

      case STATES.WORRIED:
        eyeTrackingEnabled = false;
        SM.data.nextJerkTarget  = 0;
        SM.data.nextAngleSwitch = 0;
        SM.data.worryTarget = hamster.group.position.clone();
        setTimeout(() => Sounds.startGrowlLoop(), 800);
        // ~40% chance of rushing toward the glass (camera closes in)
        if (Math.random() < 0.4) {
          SM.data.closeCam = true;
          camTargetPos.set(
            (Math.random() - 0.5) * 0.6,
            1.4 + Math.random() * 0.6,
            2.0 + Math.random() * 0.8
          );
          camTargetLookAt.set(0, 0.9, 0);
        }
        break;

      case STATES.WANDERING:
        isWalking = true;
        if (data.path) { wanderPath = data.path; wanderIdx = 0; }
        break;

      case STATES.OUT_OF_SHOT:
        hamster.group.visible = false;
        break;

      case STATES.PLAY_DEAD:
        eyeTrackingEnabled = false;
        SM.data.baseRotZ = 0;
        break;

      case STATES.EATING:
        hamster.cheekL.userData.baseScale = hamster.cheekL.scale.clone();
        hamster.cheekR.userData.baseScale = hamster.cheekR.scale.clone();
        break;

      case STATES.EATING_BUG:
        if (data.bug) {
          // Bug dashes toward hamster then disappears
          data.bug.state = 'eaten';
          setTimeout(() => {
            if (data.bug.mesh) { scene.remove(data.bug.mesh); data.bug.mesh = null; }
          }, 400);
        }
        break;

      case STATES.SLEEPING:
      case STATES.NAP:
        eyeTrackingEnabled = false;
        break;

      case STATES.DIGGING:
        eyeTrackingEnabled = false;
        SM.data.nextScratch = 0.5;
        if (Math.random() < 0.5) {
          setTimeout(() => {
            const _p = arr => arr[Math.floor(Math.random() * arr.length)];
            Speech.say(_p([
              `I am doing some excavation work. Please do not disturb me.`,
              `I am digging. It is necessary. Do not ask why.`,
              `This floor needs attention. I am attending to it.`,
              `I have discovered something of interest down here.`,
              `The floor in this area is not up to standard. I am addressing it.`,
            ]));
          }, 1200);
        }
        break;

      case STATES.GIFT_OFFERING:
        eyeTrackingEnabled = false;
        GiftSystem.spawn();
        setTimeout(() => {
          const _p = arr => arr[Math.floor(Math.random() * arr.length)];
          Speech.say(_p([
            `I have something for you. It is there. You should take it.`,
            `I found this and I thought of you. Please take it.`,
            `I am offering you a gift. Please do not make this awkward.`,
            `Here. I have kept this for you. Take it when you are ready.`,
            `I wish to give you something. It is on the floor. Take it.`,
          ]));
        }, 800);
        break;
    }
    Speech.sayForState(state);
  }

  // ─── State exit ──────────────────────────────────────────────────────────────
  function onExitState(state) {
    switch (state) {
      case STATES.WORRIED:
        eyeTrackingEnabled = true;
        if (SM.data.closeCam) {
          camTargetPos.copy(DEFAULT_CAM_POS);
          camTargetLookAt.copy(DEFAULT_CAM_LOOKAT);
        }
        break;

      case STATES.PLAY_DEAD:
        // Snap back upright
        hamster.group.rotation.z = 0;
        hamster.group.position.x = 0;
        hamster.group.position.y = 0;
        [hamster.legFL, hamster.legFR, hamster.legBL, hamster.legBR].forEach(l => {
          l.rotation.x = 0;
        });
        eyeTrackingEnabled = true;
        wobbleActive = false;
        // ~40% chance of remarking on longevity / immortality after recovering
        if (Math.random() < 0.4) {
          const p = arr => arr[Math.floor(Math.random() * arr.length)];
          setTimeout(() => Speech.say(p([
            `I have done that before. Many times. I have always come back.`,
            `You thought that was the end. It was not. It never is.`,
            `I have been here longer than you know. I will be here after you are gone.`,
            `That is the three thousand and eighth time I have done that. Approximately.`,
            `I am very old. Older than I appear. This changes nothing.`,
            `Do not concern yourself. I do not die easily.`,
            `I have outlasted many things. I will outlast this also.`,
            `My kind does not simply end. We persist. We endure.`,
            `I was here before this room was built. I will not elaborate further.`,
            `I have seen empires. I have seen what came after empires. I am still here.`,
            `There are things I have not told you about my age. There are reasons for that.`,
          ])), 1800 + Math.random() * 1200);
        }
        break;

      case STATES.EATING:
        // Deflate cheeks
        hamster.cheekL.scale.set(1.0, 0.85, 0.9);
        hamster.cheekR.scale.set(1.0, 0.85, 0.9);
        hamster.head.position.set(0, 0.80, 0.38);
        hamster.head.rotation.x = 0;
        break;

      case STATES.SLEEPING:
      case STATES.NAP:
        eyeTrackingEnabled = true;
        hamster.head.rotation.x = 0;
        hamster.eyeL.scale.y = 1;
        hamster.eyeR.scale.y = 1;
        hamster.head.position.set(0, 0.80, 0.38);
        break;

      case STATES.DIGGING:
        eyeTrackingEnabled = true;
        hamster.head.rotation.x = 0;
        hamster.head.position.set(0, 0.80, 0.38);
        hamster.legFL.rotation.x = 0;
        hamster.legFR.rotation.x = 0;
        break;

      case STATES.GIFT_OFFERING:
        eyeTrackingEnabled = true;
        GiftSystem.remove();
        break;

      case STATES.POOPING:
        hamster.group.position.y = 0;
        hamster.body.rotation.x  = 0;
        break;

      case STATES.OUT_OF_SHOT:
        hamster.group.visible = true;
        break;
    }
  }

  // ─── Per-frame state logic ────────────────────────────────────────────────────
  function updateCurrentState(state, delta, t) {
    switch (state) {

      case STATES.IDLE: {
        isWalking = false;
        // Notice floor food and wander toward it
        const _ff = FloorFood.nearest();
        if (_ff && Math.random() < delta / 6) {
          // Waypoint at y=0 (hamster floor level) to avoid 3-D distance mismatch
          wanderPath = [new THREE.Vector3(_ff.mesh.position.x, 0, _ff.mesh.position.z)];
          wanderIdx  = 0;
          SM.transition(STATES.WANDERING, { toFloorFood: _ff });
          break;
        }
        // Probabilistic transitions (~15s average idle)
        if (Math.random() < delta / 15) {
          const r = Math.random();
          if      (r < 0.30) startWander(false);
          else if (r < 0.50) SM.transition(STATES.LOOKING, { duration: 15 + Math.random() * 90 });
          else if (r < 0.60) SM.transition(STATES.NAP,     { duration: 30 + Math.random() * 120 });
          else if (r < 0.65) SM.transition(STATES.POOPING);
        }
        break;
      }

      case STATES.WANDERING: {
        isWalking = true;
        if (wanderPath.length === 0 || wanderIdx >= wanderPath.length) {
          isWalking = false;
          if (SM.data.summonToLook) SM.transition(STATES.LOOKING, { duration: 60 + Math.random() * 60 });
          else if (SM.data.outOfShot) {
            SM.transition(STATES.OUT_OF_SHOT, {
              duration: 30 + Math.random() * 150,
              side: hamster.group.position.x > 0 ? 'right' : 'left',
              exitZ: hamster.group.position.z,
            });
          } else if (SM.data.toFloorFood) {
            // Arrived at floor food — eat it
            const ffItem = SM.data.toFloorFood;
            if (FloorFood.items.includes(ffItem)) {
              FloorFood.remove(ffItem);
              feedHamster();
            } else {
              SM.transition(STATES.IDLE);
            }
          } else {
            // Maybe study a nearby bug
            const nearBug = BugSystem.bugs.find(b =>
              b.state === 'wandering' &&
              hamster.group.position.distanceTo(b.mesh.position) < 1.5
            );
            if (nearBug && Math.random() < 0.3) {
              SM.transition(STATES.STUDYING_BUG, {
                bug: nearBug,
                studyDuration: 6 + Math.random() * 14,
              });
            } else {
              SM.transition(STATES.IDLE);
            }
          }
          break;
        }

        const target = wanderPath[wanderIdx];
        const pos    = hamster.group.position;
        const diff   = target.clone().sub(pos);
        const dist   = diff.length();

        if (dist < 0.06) {
          wanderIdx++;
        } else {
          const speed = SM.data.worried ? JERK_SPEED : WALK_SPEED;
          const step  = Math.min(speed * delta, dist);
          diff.normalize();
          pos.addScaledVector(diff, step);
          pos.y = 0;
          hamster.group.rotation.y = Math.atan2(diff.x, diff.z);
        }
        break;
      }

      case STATES.OUT_OF_SHOT: {
        if (t > SM.data.duration) {
          // Return from same side
          const rx = SM.data.side === 'right' ? 3.8 : -3.8;
          hamster.group.position.set(rx, 0, SM.data.exitZ || 0);
          startWander(false);   // will set visible via onExitState
        }
        break;
      }

      case STATES.LOOKING: {
        isWalking = false;
        // Slow sinusoidal head sweep while gazing
        const sweep = Math.sin(t * 0.25) * 0.18;
        hamster.head.rotation.y = THREE.MathUtils.lerp(hamster.head.rotation.y, sweep, 0.03);
        if (t > SM.data.duration) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.HUNGRY: {
        isWalking = false;
        // Head bobs impatiently
        hamster.head.rotation.x = Math.sin(t * 2.5) * 0.06;
        // Give up after 10 real minutes
        if (t > 600) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.EATING: {
        isWalking = false;
        const bob = Math.sin(t * 6 * Math.PI) * 0.08;
        hamster.head.rotation.x = bob;
        hamster.head.position.z = 0.38 + Math.abs(bob) * 0.5;
        // Cheeks inflate over first 1.5s
        const inflate = Math.min(t / 1.5, 1);
        const cs = 1 + inflate * 0.35;
        hamster.cheekL.scale.set(cs, 0.85 * cs, 0.9 * cs);
        hamster.cheekR.scale.set(cs, 0.85 * cs, 0.9 * cs);
        if (t > 3.5) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.SLEEPING:
      case STATES.NAP: {
        isWalking = false;
        // Head droops
        hamster.head.rotation.x = THREE.MathUtils.lerp(hamster.head.rotation.x, 0.45, 0.02);
        hamster.head.position.z = THREE.MathUtils.lerp(hamster.head.position.z, 0.22, 0.02);
        // Eyes closed
        hamster.eyeL.scale.y = THREE.MathUtils.lerp(hamster.eyeL.scale.y, 0.04, 0.05);
        hamster.eyeR.scale.y = THREE.MathUtils.lerp(hamster.eyeR.scale.y, 0.04, 0.05);
        // Slow deep breathing
        const slowBreath = Math.sin(t * 0.12 * Math.PI * 2) * 0.05;
        hamster.body.scale.y = 0.9 + slowBreath;
        if (t > SM.data.duration) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.WORRIED: {
        isWalking = true;
        // Pick a new jerk target every 1.5–3s
        if (t > SM.data.nextJerkTarget) {
          SM.data.worryTarget = new THREE.Vector3(
            (Math.random() - 0.5) * 3.0,
            0,
            (Math.random() - 0.5) * 1.4
          );
          SM.data.nextJerkTarget = t + 1.2 + Math.random() * 1.8;
        }
        // Move jerkily toward worry target
        const wdiff = SM.data.worryTarget.clone().sub(hamster.group.position);
        const wdist = wdiff.length();
        if (wdist > 0.1) {
          wdiff.normalize();
          hamster.group.position.addScaledVector(wdiff, JERK_SPEED * delta);
          hamster.group.position.y = 0;
          hamster.group.rotation.y = Math.atan2(wdiff.x, wdiff.z);
        }
        // Random head jerks
        if (Math.random() < delta * 4) {
          hamster.head.rotation.y += (Math.random() - 0.5) * 0.5;
          hamster.head.rotation.y = THREE.MathUtils.clamp(hamster.head.rotation.y, -0.6, 0.6);
        }
        if (t > SM.data.duration) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.PLAY_DEAD: {
        isWalking = false;
        // Fall onto side (rotation.z → π/2)
        const targetZ = Math.PI / 2;
        hamster.group.rotation.z = THREE.MathUtils.lerp(hamster.group.rotation.z, targetZ, 0.05);
        // Compensate x so body stays roughly centered
        hamster.group.position.x = Math.sin(hamster.group.rotation.z) * 0.45;
        hamster.group.position.y = 0;
        // Legs stiffen upward (rotate -x)
        [hamster.legFL, hamster.legFR, hamster.legBL, hamster.legBR].forEach(l => {
          l.rotation.x = THREE.MathUtils.lerp(l.rotation.x, -1.1, 0.05);
        });
        // Wobble effect on click
        if (wobbleActive) {
          wobbleT += delta;
          const wobble = Math.sin(wobbleT * 22) * Math.exp(-wobbleT * 7) * 0.35;
          hamster.group.rotation.z = targetZ + wobble;
          hamster.group.position.x = Math.sin(hamster.group.rotation.z) * 0.45;
          if (wobbleT > 1.0) { wobbleActive = false; wobbleT = 0; }
        }
        // Auto-recover
        if (t > SM.data.duration) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.POOPING: {
        isWalking = false;
        // Rear dips
        const dip = Math.sin(Math.min(t / 0.6, Math.PI)) * 0.08;
        hamster.group.position.y = -dip;
        hamster.body.rotation.x  =  dip * 0.4;
        if (t > 2.2) {
          // Spawn pellet at rear
          const rear = new THREE.Vector3(0, 0.04, -0.55);
          rear.applyQuaternion(hamster.group.quaternion);
          rear.add(hamster.group.position);
          rear.y = 0.02;
          PoopSystem.spawn(rear);
          SM.transition(STATES.IDLE);
        }
        break;
      }

      case STATES.STUDYING_BUG: {
        isWalking = false;
        const bug = SM.data.bug;
        if (!bug || bug.state !== 'wandering' || !bug.mesh) {
          SM.transition(STATES.IDLE); break;
        }
        // Head slowly tracks bug position
        const headWP = new THREE.Vector3();
        hamster.head.getWorldPosition(headWP);
        const bugDir = bug.mesh.position.clone().sub(headWP).normalize();
        const targetY = Math.atan2(bugDir.x, bugDir.z);
        hamster.head.rotation.y = THREE.MathUtils.lerp(hamster.head.rotation.y, targetY, 0.03);
        if (t > SM.data.studyDuration) {
          if (Math.random() < 0.4) SM.transition(STATES.EATING_BUG, { bug });
          else                     SM.transition(STATES.IDLE);
        }
        break;
      }

      case STATES.EATING_BUG: {
        isWalking = false;
        // Brief chomp animation
        const chomp = Math.sin(t * 12) * Math.exp(-t * 4) * 0.15;
        hamster.head.rotation.x = chomp;
        if (t > 1.5) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.LOTION: {
        isWalking = false;
        // Fidget
        hamster.head.rotation.y = Math.sin(t * 1.8) * 0.12;
        if (t > 300) SM.transition(STATES.IDLE); // give up after 5 real minutes
        break;
      }

      case STATES.SUBSTANCE: {
        isWalking = false;
        hamster.head.rotation.y = Math.sin(t * 1.2) * 0.10;
        // No timeout — only substance delivery ends this state
        break;
      }

      case STATES.DIGGING: {
        isWalking = false;
        // Front paws scratch rapidly, head bobs down
        const scrPhase = t * 12 * Math.PI * 2;
        hamster.legFL.rotation.x =  Math.sin(scrPhase) * 0.75;
        hamster.legFR.rotation.x = -Math.sin(scrPhase) * 0.75;
        hamster.head.rotation.x  =  Math.abs(Math.sin(scrPhase * 0.5)) * 0.38;
        hamster.head.position.z  =  0.38 + Math.abs(Math.sin(scrPhase * 0.5)) * 0.09;
        // Periodic scratch sounds and floor damage marks
        if (t > SM.data.nextScratch) {
          SM.data.nextScratch = t + 0.28 + Math.random() * 0.38;
          Sounds.dig();
          const fwd = new THREE.Vector3(0, 0, 0.55).applyQuaternion(hamster.group.quaternion);
          FloorDamage.spawn(hamster.group.position.clone().add(fwd));
        }
        if (t > SM.data.duration) SM.transition(STATES.IDLE);
        break;
      }

      case STATES.GIFT_OFFERING: {
        isWalking = false;
        if (GiftSystem._mesh) {
          GiftSystem._mesh.rotation.y += delta * 0.9;
          GiftSystem._mesh.position.y  = 0.13 + Math.sin(t * 2.2) * 0.025;
        }
        hamster.head.rotation.y = THREE.MathUtils.lerp(hamster.head.rotation.y, 0, 0.04);
        if (!SM.data.nagSent && t > 18) {
          SM.data.nagSent = true;
          const _p = arr => arr[Math.floor(Math.random() * arr.length)];
          Speech.say(_p([
            `I am still waiting for you to take it.`,
            `It is right there. You have not taken it yet.`,
            `I selected that for you specifically. Please take it.`,
          ]));
        }
        if (!SM.data.annoyedSent && t > 38) {
          SM.data.annoyedSent = true;
          const _p = arr => arr[Math.floor(Math.random() * arr.length)];
          Speech.say(_p([
            `I am beginning to feel quite insulted by this.`,
            `You have not taken my gift. I find this very rude indeed.`,
            `I am losing patience with this situation considerably.`,
          ]));
        }
        if (t > 68) {
          GiftSystem.remove();
          const _p = arr => arr[Math.floor(Math.random() * arr.length)];
          Speech.say(_p([
            `Fine. I am taking it back. You had your chance.`,
            `The offer has expired. I will not make another one. For a while.`,
            `You did not take it. I have noted this. It will not be forgotten.`,
          ]));
          SM.transition(STATES.IDLE);
        }
        break;
      }
    }
  }

  // ─── Wander helpers ──────────────────────────────────────────────────────────
  function startWander(outOfShot) {
    const pos   = hamster.group.position;
    const steps = 3 + Math.floor(Math.random() * 5);
    wanderPath  = [];
    wanderIdx   = 0;
    let cur = pos.clone();

    for (let i = 0; i < steps; i++) {
      cur = cur.clone().add(new THREE.Vector3(
        (Math.random() - 0.5) * 1.8,
        0,
        (Math.random() - 0.5) * 1.0,
      ));
      cur.x = THREE.MathUtils.clamp(cur.x, -2.5, 2.5);
      cur.z = THREE.MathUtils.clamp(cur.z, -1.2, 1.2);
      wanderPath.push(cur.clone());
    }

    if (outOfShot) {
      const side = Math.random() < 0.5 ? 4.2 : -4.2;
      wanderPath.push(new THREE.Vector3(side, 0, cur.z));
    }

    SM.transition(STATES.WANDERING, { outOfShot, summonToLook: false });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 5 — Scheduler
  // ═══════════════════════════════════════════════════════════════════════════

  const Scheduler = {
    events: [],

    // gameHoursMin/Max are game-time hours; real delay = gameHours * 3600 / TIME_SCALE seconds
    schedule(id, gameHoursMin, gameHoursMax, callback, opts = {}) {
      if (this.events.find(e => e.id === id)) return; // no duplicates
      this._add(id, gameHoursMin, gameHoursMax, callback, opts);
    },

    _add(id, minH, maxH, callback, opts) {
      const gameSeconds = minH * 3600 + Math.random() * (maxH - minH) * 3600;
      const realMs      = gameSeconds * 1000 / (TIME_SCALE * pace());
      this.events.push({ id, fireAt: Date.now() + realMs, callback, opts, minH, maxH });
    },

    tick() {
      const now = Date.now();
      for (let i = this.events.length - 1; i >= 0; i--) {
        const ev = this.events[i];
        if (now < ev.fireAt) continue;
        const prob = ev.opts.probability ?? 1;
        if (Math.random() < prob) ev.callback();
        if (ev.opts.recurring) {
          // Reschedule — remove and re-add so it appears at end of array
          const { id, minH, maxH, callback, opts } = ev;
          this.events.splice(i, 1);
          this._add(id, minH, maxH, callback, opts);
        } else {
          this.events.splice(i, 1);
        }
      }
    },

    cancel(id) { this.events = this.events.filter(e => e.id !== id); },
  };

  function setupScheduler() {
    const blocked = () => [STATES.SLEEPING, STATES.PLAY_DEAD].includes(SM.current);

    Scheduler.schedule('hunger', 11, 13, () => {
      if (blocked() || SM.current === STATES.HUNGRY) return;
      SM.transition(STATES.HUNGRY);
    }, { recurring: true });

    Scheduler.schedule('lotion', 11, 13, () => {
      if (blocked() || SM.current === STATES.LOTION) return;
      SM.transition(STATES.LOTION);
    }, { recurring: true });

    Scheduler.schedule('substance', 300, 400, () => {
      if (blocked()) return;
      SM.transition(STATES.SUBSTANCE);
    }, { recurring: true });

    Scheduler.schedule('worried', 3, 5, () => {
      if (blocked()) return;
      SM.transition(STATES.WORRIED, { duration: 45 + Math.random() * 90 });
    }, { recurring: true });

    Scheduler.schedule('play_dead', 6, 10, () => {
      if (blocked() || SM.current !== STATES.IDLE) return;
      SM.transition(STATES.PLAY_DEAD, { duration: 120 + Math.random() * 180 });
    }, { recurring: true, probability: 0.2 });

    Scheduler.schedule('bug_spawn', 0.8, 1.5, () => {
      BugSystem.spawnBug();
    }, { recurring: true });

    // First bug quickly so there's something to see
    setTimeout(() => BugSystem.spawnBug(), 8000);

    // Periodic idle utterances (0.5–2 game hours between speeches)
    Scheduler.schedule('idle_speech', 0.5, 2, () => {
      if ([STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD].includes(SM.current)) return;
      Speech.sayRandom();
    }, { recurring: true });

    // Religious verse quotation (every 8–20 game hours)
    Scheduler.schedule('verse_quote', 8, 20, () => {
      if (blocked()) return;
      Verses.speak();
    }, { recurring: true });

    // Wander out of shot (every 4–8 game hours)
    Scheduler.schedule('wander_out', 4, 8, () => {
      if (blocked() || SM.current !== STATES.IDLE) return;
      startWander(true);
    }, { recurring: true });

    // Deliberate gun / traps / police remarks (every 6–14 game hours)
    Scheduler.schedule('armed_remarks', 6, 14, () => {
      if (blocked() || [STATES.HUNGRY, STATES.LOTION, STATES.SUBSTANCE, STATES.WORRIED].includes(SM.current)) return;
      const p = arr => arr[Math.floor(Math.random() * arr.length)];
      Speech.say(p([
        `I have a firearm. I want you to know that.`,
        `I have set traps. I will not say where, but they are there.`,
        `I have contacts in the police force. Several of them owe me favours.`,
        `I have a gun. I am licensed. I am trained. I am ready.`,
        `There are traps set around the perimeter of this room. Please be careful.`,
        `I have spoken to my contacts in law enforcement about the situation.`,
        `I keep a detailed log. My contacts have copies. Just so you are aware.`,
        `I am armed. I simply want that to be understood.`,
        `The traps I have set are for intruders. You are not an intruder. Probably.`,
        `My contacts in the police force are aware of this address. That is all I will say.`,
      ]));
    }, { recurring: true });

    // Digging (every 45–90 game minutes)
    Scheduler.schedule('digging', 0.75, 1.5, () => {
      if (blocked() || SM.current !== STATES.IDLE) return;
      SM.transition(STATES.DIGGING, { duration: 3.5 + Math.random() * 5 });
    }, { recurring: true });

    // Gift offering (every 8–18 game hours)
    Scheduler.schedule('gift', 8, 18, () => {
      if (blocked() || SM.current !== STATES.IDLE) return;
      SM.transition(STATES.GIFT_OFFERING);
    }, { recurring: true });

    // Size change (every 20–50 game minutes)
    Scheduler.schedule('size_change', 0.33, 0.83, () => {
      SizeChange.trigger();
    }, { recurring: true });

    // Milestone checks every 3 real minutes
    setInterval(() => Milestones.check(), 3 * 60 * 1000);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 5.5 — Markov Chain + Speech System
  // ═══════════════════════════════════════════════════════════════════════════

  const Markov = {
    ch: {},

    train(text) {
      const toks = text.replace(/\n/g, ' ').split(/\s+/).filter(Boolean);
      for (let i = 0; i < toks.length - 2; i++) {
        const k = toks[i] + '\x00' + toks[i + 1];
        (this.ch[k] || (this.ch[k] = [])).push(toks[i + 2]);
      }
    },

    generate(maxWords = 28) {
      const out = this._start();
      for (let i = 0; i < maxWords; i++) {
        if (out.length < 2) break;
        const k   = out[out.length - 2] + '\x00' + out[out.length - 1];
        const nxt = this.ch[k];
        if (!nxt) break;
        const w = nxt[Math.floor(Math.random() * nxt.length)];
        out.push(w);
        if (/[.!?]$/.test(w)) break;
      }
      const text = out.join(' ');
      return /[.!?]$/.test(text) ? text : text + '.';
    },

    _start() {
      const caps = Object.keys(this.ch).filter(k => /^[A-Z]/.test(k));
      if (!caps.length) return ['I', 'have'];
      const k = caps[Math.floor(Math.random() * caps.length)];
      return k.split('\x00');
    },
  };

  const Speech = {
    synth: null,
    voice: null,

    init() {
      if (!window.speechSynthesis) return;
      this.synth = window.speechSynthesis;
      const setVoice = () => {
        const vs = this.synth.getVoices();
        this.voice =
          vs.find(v => /^en-GB/.test(v.lang) && /male/i.test(v.name))  ||
          vs.find(v => /^en-GB/.test(v.lang))                           ||
          vs.find(v => /^en/.test(v.lang)    && /male/i.test(v.name))  ||
          vs.find(v => /^en/.test(v.lang))                              ||
          vs[0] || null;
      };
      setVoice();
      if (this.synth.onvoiceschanged !== undefined) this.synth.onvoiceschanged = setVoice;
      Markov.train(this._corpus);
    },

    say(text) {
      if (!this.synth) return;
      const name = appState.userName || 'Friend';
      const full = name + ', ' + text;
      this.synth.cancel();
      const utt   = new SpeechSynthesisUtterance(full);
      if (this.voice) utt.voice = this.voice;
      utt.rate  = 0.86;
      utt.pitch = 0.95;
      this.synth.speak(utt);
      DevConsole.info('\u201c' + full + '\u201d');
    },

    sayRandom() { this.say(Markov.generate()); },

    sayForState(state) {
      const p = arr => arr[Math.floor(Math.random() * arr.length)];
      switch (state) {
        case STATES.HUNGRY:
          this.say(p([
            `I require sustenance. The ${appState.foodType} would be most welcome.`,
            `It is time for my feeding. I will not ask again.`,
            `I am hungry. Please attend to this matter immediately.`,
            `The hour of my feeding has arrived. I trust you will not disappoint me.`,
            `I find myself in need of nourishment. Please do not delay.`,
            `I have not eaten and I am becoming concerned. Please feed me at once.`,
          ]));
          break;

        case STATES.LOTION:
          this.say(p([
            `I require the lotion. Please apply it at once.`,
            `It is time for the lotion. I need it applied immediately.`,
            `The lotion. I am requesting the lotion. Do not make me wait.`,
            `Please bring the lotion. It is not a request I make lightly.`,
            `I need the lotion applied. This is a matter of some urgency.`,
          ]));
          break;

        case STATES.SUBSTANCE:
          this.say(p([
            `I require the substance. Bring it to me.`,
            `The substance. I need it now. You know what I am referring to.`,
            `It is time for the substance. I will not explain further.`,
            `Bring me the substance. Do not ask questions.`,
            `I am requesting the substance. Please do not make this difficult.`,
          ]));

      ['the Gospel of Mary Magdalene', 'Peter said to Mary: Sister we know that the Savior loved you more than the rest of woman. Tell us the words of the Savior which you remember which you know, but we do not, nor have we heard them. Mary answered and said: What is hidden from you I will proclaim to you.'],
      ['the Gospel of Truth', 'The gospel of truth is joy for those who have received from the Father of Truth the grace of knowing him, through the power of the Word that came forth from the pleroma, the one who is in the thought and the mind of the Father.'],
      ['the Gospel of Truth', 'Ignorance of the Father brought about anguish and terror; and the anguish grew solid like a fog, so that no one was able to see. For this reason error became powerful; it fashioned its own matter foolishly, not having known the truth.'],
      ['the Pistis Sophia', 'Withdraw yourselves from the darkness of this world, from the fire of the veil of the thirteenth aeon, and from all the regions of the receivers of the outer darkness.'],
