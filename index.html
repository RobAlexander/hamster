  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 5.7 — Sounds (Web Audio API)
  // ═══════════════════════════════════════════════════════════════════════════

  const Sounds = {
    _actx: null,

    _ctx() {
      if (!this._actx) {
        try { this._actx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      if (this._actx.state === 'suspended') this._actx.resume();
      return this._actx;
    },

    unlock() { this._ctx(); },

    // Wet squelching lotion noise
    lotion() {
      const ctx = this._ctx();
      if (!ctx) return;
      const t   = ctx.currentTime;
      const dur = 1.5;

      // White noise burst
      const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buf;

      // Bandpass sweeps 500 → 100 Hz for that squelchy quality
      const bp  = ctx.createBiquadFilter();
      bp.type   = 'bandpass';
      bp.Q.value = 4;
      bp.frequency.setValueAtTime(500, t);
      bp.frequency.exponentialRampToValueAtTime(100, t + dur);

      // Amplitude: quick attack, slow decay with a mid-swell
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0,    t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.04);
      gain.gain.setValueAtTime(0.4,  t + 0.25);
      gain.gain.linearRampToValueAtTime(0.15, t + dur * 0.75);
      gain.gain.linearRampToValueAtTime(0,   t + dur);

      src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
      src.start(t);
    },

    // Single low growl burst — call startGrowlLoop() to sustain during WORRIED
    growl() {
      const ctx = this._ctx();
      if (!ctx) return;
      const t   = ctx.currentTime;
      const dur = 0.7 + Math.random() * 0.6;

      // Sawtooth oscillator for grit
      const osc  = ctx.createOscillator();
      osc.type   = 'sawtooth';
      osc.frequency.setValueAtTime(70 + Math.random() * 40, t);
      osc.frequency.linearRampToValueAtTime(55 + Math.random() * 25, t + dur);

      // Tremolo LFO
      const lfo  = ctx.createOscillator();
      lfo.frequency.value = 6 + Math.random() * 6;
      const lfoG = ctx.createGain();
      lfoG.gain.value = 22;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);

      // Noise grit layer
      const nBuf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
      const nd   = nBuf.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * 0.12;
      const nSrc = ctx.createBufferSource();
      nSrc.buffer = nBuf;
      const nBP  = ctx.createBiquadFilter();
      nBP.type   = 'bandpass';
      nBP.frequency.value = 180;
      nBP.Q.value = 1.2;
      nSrc.connect(nBP);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0,    t);
      gain.gain.linearRampToValueAtTime(0.13, t + 0.07);
      gain.gain.setValueAtTime(0.13, t + dur - 0.1);
      gain.gain.linearRampToValueAtTime(0,   t + dur);

      osc.connect(gain); nBP.connect(gain); gain.connect(ctx.destination);
      lfo.start(t);   lfo.stop(t + dur);
      osc.start(t);   osc.stop(t + dur);
      nSrc.start(t);
    },

    // Loops growls for the duration of the WORRIED state
    startGrowlLoop() {
      if (SM.current !== STATES.WORRIED) return;
      this.growl();
      setTimeout(() => this.startGrowlLoop(), (1800 + Math.random() * 2400));
    },

    // Short sharp bite snap when mouse gets too close
    snap() {
      const ctx = this._ctx();
      if (!ctx) return;
      const t   = ctx.currentTime;
      const dur = 0.07;
      const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2.5);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const hp  = ctx.createBiquadFilter();
      hp.type   = 'highpass'; hp.frequency.value = 1600;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      src.connect(hp); hp.connect(gain); gain.connect(ctx.destination);
      src.start(t);
    },

    // Weird ascending/descending pitch warp when size changes
    resize(dir) {
      const ctx = this._ctx();
      if (!ctx) return;
      const t   = ctx.currentTime;
      const dur = 0.9;
      const osc = ctx.createOscillator();
      osc.type  = 'sawtooth';
      osc.frequency.setValueAtTime(dir === 'up' ? 110 : 660, t);
      osc.frequency.exponentialRampToValueAtTime(dir === 'up' ? 660 : 110, t + dur * 0.75);
      const lfo  = ctx.createOscillator();
      lfo.frequency.value = 16;
      const lfoG = ctx.createGain(); lfoG.gain.value = 55;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      const wave = ctx.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) { const x = i*2/255-1; curve[i] = (Math.PI+180)*x/(Math.PI+180*Math.abs(x)); }
      wave.curve = curve;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.04);
      gain.gain.setValueAtTime(0.15, t + dur * 0.65);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      osc.connect(wave); wave.connect(gain); gain.connect(ctx.destination);
      lfo.start(t); lfo.stop(t + dur);
      osc.start(t); osc.stop(t + dur);
    },

    // Scratchy scraping sound during digging
    dig() {
      const ctx = this._ctx();
      if (!ctx) return;
      const t   = ctx.currentTime;
      const dur = 0.32 + Math.random() * 0.18;
      const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const bp  = ctx.createBiquadFilter();
      bp.type   = 'bandpass'; bp.Q.value = 2.5;
      bp.frequency.setValueAtTime(900 + Math.random()*300, t);
      bp.frequency.linearRampToValueAtTime(280, t + dur);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + dur);
      src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
      src.start(t);
    },

    // Happy appreciative chirps when eating from the food pile
    eat() {
      const ctx = this._ctx();
      if (!ctx) return;
      const t = ctx.currentTime;
      const chirps = 3 + Math.floor(Math.random() * 4);
      for (let i = 0; i < chirps; i++) {
        const delay = i * (0.075 + Math.random() * 0.055);
        const freq  = 680 + Math.random() * 440;
        const dur   = 0.055 + Math.random() * 0.06;
        const osc   = ctx.createOscillator();
        osc.type    = 'triangle';
        osc.frequency.setValueAtTime(freq, t + delay);
        osc.frequency.exponentialRampToValueAtTime(freq * (0.7 + Math.random() * 0.2), t + delay + dur);
        const gain  = ctx.createGain();
        gain.gain.setValueAtTime(0,    t + delay);
        gain.gain.linearRampToValueAtTime(0.16, t + delay + 0.012);
        gain.gain.linearRampToValueAtTime(0,    t + delay + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t + delay); osc.stop(t + delay + dur + 0.02);
      }
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 6 — Poop System
  // ═══════════════════════════════════════════════════════════════════════════

  const PoopSystem = {
    pellets:      [],
    poopMat:      null,
    _nagLevel:    0,
    _nagCooldown: 0,

    init() {
      this.poopMat = new THREE.MeshStandardMaterial({ color: 0x3a1f0a, roughness: 0.9 });
    },

    spawn(position) {
      const geo  = new THREE.SphereGeometry(0.042, 6, 4);
      const mesh = new THREE.Mesh(geo, this.poopMat);
      mesh.castShadow = true;
      mesh.position.copy(position);
      // Small random scatter
      mesh.position.x += (Math.random() - 0.5) * 0.1;
      mesh.position.z += (Math.random() - 0.5) * 0.1;
      mesh.position.y  = 0.042;
      scene.add(mesh);
      this.pellets.push({ mesh, spawnedAt: Date.now(), hasLegs: false, legMeshes: [], crawlDir: null });
      this._save();
    },

    update(delta) {
      const oneHourMs = 3600 * 1000 / TIME_SCALE;
      const now = Date.now();
      for (let i = this.pellets.length - 1; i >= 0; i--) {
        const p   = this.pellets[i];
        const age = now - p.spawnedAt;
        if (!p.hasLegs && age > oneHourMs) this._growLegs(p);
        if (p.hasLegs && p.crawlDir) {
          p.mesh.position.addScaledVector(p.crawlDir, delta * 0.06);
          // Wobble legs
          const wt = age / 1000;
          p.legMeshes.forEach((leg, j) => {
            leg.rotation.x = Math.sin(wt * 4 + j * Math.PI / 2) * 0.4;
          });
          // Remove when far off surface
          if (Math.abs(p.mesh.position.x) > 5.5 || Math.abs(p.mesh.position.z) > 4.5) {
            scene.remove(p.mesh);
            this.pellets.splice(i, 1);
          }
        }
      }
      this._checkNag(now);
    },

    // Escalating complaints about uncleaned poop
    _checkNag(now) {
      if (!this.pellets.length) { this._nagLevel = 0; return; }
      if (now < this._nagCooldown) return;
      if ([STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD, STATES.SUBSTANCE].includes(SM.current)) return;

      const oldestAge = now - Math.min(...this.pellets.map(p => p.spawnedAt));
      const gameMins  = (oldestAge / 1000) * TIME_SCALE / 60;

      let newLevel = 0;
      if      (gameMins >= 25) newLevel = 4;
      else if (gameMins >= 15) newLevel = 3;
      else if (gameMins >= 8)  newLevel = 2;
      else if (gameMins >= 3)  newLevel = 1;

      if (newLevel > 0 && newLevel >= this._nagLevel) {
        this._nagLevel = newLevel;
        // Cooldown shrinks as anger rises: 10 / 7 / 5 / 3 game-minutes
        const coolMins     = [0, 10, 7, 5, 3][newLevel];
        this._nagCooldown  = now + (coolMins * 60 * 1000 / TIME_SCALE);
        this._fireNag(newLevel);
      }
    },

    _fireNag(level) {
      const p = arr => arr[Math.floor(Math.random() * arr.length)];
      const phrases = [
        null,
        [  // level 1 — polite
          `I notice there is something on the floor that perhaps requires your attention.`,
          `When you have a moment, there is a small matter on the floor to address.`,
          `I would appreciate it if you could attend to the floor at your earliest convenience.`,
          `There is something there. On the floor. I trust you have noticed.`,
        ],
        [  // level 2 — annoyed
          `I must insist you clean up the floor. This is not entirely acceptable.`,
          `The situation on the floor has not improved. Please deal with it.`,
          `I asked you once. I should not need to ask again. The floor.`,
          `I am trying to be patient about the floor. I am finding it difficult.`,
        ],
        [  // level 3 — quite irritated
          `I find the continued presence of that on the floor deeply offensive.`,
          `How long do you intend to leave that there? This is becoming intolerable.`,
          `I am losing patience with you. Clean up the floor. Now.`,
          `That has been there for some time now. I am not pleased. The floor. Please.`,
        ],
        [  // level 4 — furious
          `I am absolutely disgusted. Clean that up immediately or there will be consequences.`,
          `This is beyond all reason. I will remember this. Clean. The. Floor.`,
          `I have contacts. Do not test me. The floor. Deal with it. Now. Immediately.`,
          `This is a health hazard. I am documenting this. Clean the floor this instant.`,
          `I have set a trap near that area. For your safety, clean it up immediately.`,
        ],
      ];
      Speech.say(p(phrases[level]));
    },

    _growLegs(pellet) {
      pellet.hasLegs  = true;
      pellet.crawlDir = new THREE.Vector3(
        (Math.random() - 0.5) * 2,
        0,
        (Math.random() - 0.5) * 2,
      ).normalize();
      const legMat = new THREE.MeshStandardMaterial({ color: 0x2a1505, roughness: 0.9 });
      for (let j = 0; j < 6; j++) {
        const leg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.005, 0.003, 0.065, 4),
          legMat,
        );
        const angle = (j / 6) * Math.PI * 2;
        leg.position.set(Math.cos(angle) * 0.048, 0, Math.sin(angle) * 0.048);
        leg.rotation.z = Math.cos(angle) * (Math.PI / 2 - 0.4);
        leg.rotation.x = Math.sin(angle) * (Math.PI / 2 - 0.4);
        pellet.mesh.add(leg);
        pellet.legMeshes.push(leg);
      }
    },

    handleClick(clientX, clientY) {
      const hits = raycastObjects(clientX, clientY, this.pellets.map(p => p.mesh));
      if (!hits.length) return false;
      const hitMesh = hits[0].object;
      const idx     = this.pellets.findIndex(p => p.mesh === hitMesh);
      if (idx < 0) return false;
      scene.remove(this.pellets[idx].mesh);
      this.pellets.splice(idx, 1);
      appState.stats.poopPickedUp++;
      Persist.saveStats();
      if (!this.pellets.length) this._nagLevel = 0;
      this._save();
      return true;
    },

    _save() {
      const data = this.pellets.map(p => ({
        x: p.mesh.position.x, z: p.mesh.position.z, spawnedAt: p.spawnedAt,
      }));
      localStorage.setItem('hamster_poop', JSON.stringify(data));
    },

    loadSaved() {
      try {
        const data = JSON.parse(localStorage.getItem('hamster_poop') || '[]');
        for (const { x, z, spawnedAt } of data) {
          const geo  = new THREE.SphereGeometry(0.042, 6, 4);
          const mesh = new THREE.Mesh(geo, this.poopMat);
          mesh.castShadow = true;
          mesh.position.set(x, 0.042, z);
          scene.add(mesh);
          const pellet = { mesh, spawnedAt, hasLegs: false, legMeshes: [], crawlDir: null };
          this.pellets.push(pellet);
          // Restore legs if old enough
          const age = Date.now() - spawnedAt;
          if (age > 3600 * 1000 / TIME_SCALE) this._growLegs(pellet);
        }
      } catch (e) { /* ignore malformed data */ }
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 7 — Bug System
  // ═══════════════════════════════════════════════════════════════════════════

  const BugSystem = {
    bugs: [],

    spawnBug() {
      if (this.bugs.length >= 3) return;
      const mesh = this._makeMesh();
      scene.add(mesh);
      // Enter from a random surface edge
      const side = Math.floor(Math.random() * 4);
      const pos  = new THREE.Vector3();
      switch (side) {
        case 0: pos.set(-3.8,  0.02, (Math.random() - 0.5) * 2); break;
        case 1: pos.set( 3.8,  0.02, (Math.random() - 0.5) * 2); break;
        case 2: pos.set((Math.random() - 0.5) * 5, 0.02, -2.2);  break;
        case 3: pos.set((Math.random() - 0.5) * 5, 0.02,  2.2);  break;
      }
      mesh.position.copy(pos);
      const bug = {
        mesh,
        vel:        new THREE.Vector3((Math.random() - 0.5), 0, (Math.random() - 0.5)).normalize().multiplyScalar(0.25 + Math.random() * 0.25),
        dirTimer:   1.5 + Math.random() * 3,
        state:      'wandering',
        legPhase:   0,
      };
      this.bugs.push(bug);
    },

    _makeMesh() {
      const g      = new THREE.Group();
      const darkM  = new THREE.MeshStandardMaterial({ color: 0x1a150a, roughness: 0.8 });
      const segGeo = new THREE.SphereGeometry(0.018, 5, 4);
      for (let i = 0; i < 3; i++) {
        const seg = new THREE.Mesh(segGeo, darkM);
        seg.scale.set(1.0, 0.65, 1.2);
        seg.position.z = (i - 1) * 0.030;
        g.add(seg);
      }
      // 6 legs
      const legGeo = new THREE.CylinderGeometry(0.004, 0.002, 0.058, 4);
      for (let s = -1; s <= 1; s += 2) {
        for (let j = 0; j < 3; j++) {
          const leg = new THREE.Mesh(legGeo, darkM);
          leg.position.set(s * 0.034, 0, (j - 1) * 0.024);
          leg.rotation.z  = s * (Math.PI / 2 - 0.45);
          g.add(leg);
        }
      }
      return g;
    },

    update(delta) {
      for (let i = this.bugs.length - 1; i >= 0; i--) {
        const bug = this.bugs[i];
        if (bug.state === 'eaten') { this.bugs.splice(i, 1); continue; }
        if (!bug.mesh) { this.bugs.splice(i, 1); continue; }

        bug.dirTimer -= delta;
        if (bug.dirTimer <= 0) {
          const a = Math.random() * Math.PI * 2;
          bug.vel.set(Math.cos(a), 0, Math.sin(a)).multiplyScalar(0.2 + Math.random() * 0.3);
          bug.dirTimer = 1.5 + Math.random() * 3;
        }

        bug.mesh.position.addScaledVector(bug.vel, delta);
        bug.mesh.position.y = 0.02;
        if (bug.vel.lengthSq() > 0) bug.mesh.rotation.y = Math.atan2(bug.vel.x, bug.vel.z);

        // Animate legs
        bug.legPhase = (bug.legPhase || 0) + delta * 8;
        const children = bug.mesh.children;
        for (let k = 3; k < children.length; k++) {
          children[k].rotation.x = Math.sin(bug.legPhase + k) * 0.25;
        }

        // Remove if off surface
        if (Math.abs(bug.mesh.position.x) > 5.5 || Math.abs(bug.mesh.position.z) > 4.5) {
          scene.remove(bug.mesh);
          this.bugs.splice(i, 1);
        }
      }
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 7.2 — Bite System (snap at nearby cursor)
  // ═══════════════════════════════════════════════════════════════════════════

  const BiteSystem = {
    _active:   false,
    _t:        0,
    _cooldown: 0,

    update(delta) {
      const BITE_STATES = [STATES.IDLE, STATES.LOOKING, STATES.HUNGRY];
      if (!BITE_STATES.includes(SM.current)) return;

      this._cooldown = Math.max(0, this._cooldown - delta);

      if (this._active) {
        this._t += delta;
        const LUNGE = 0.075, TOTAL = 0.22;
        if (this._t < LUNGE) {
          const p = this._t / LUNGE;
          hamster.head.position.z = 0.38 + p * 0.30;
          hamster.head.rotation.x = -p * 0.42;
        } else if (this._t < TOTAL) {
          const p = (this._t - LUNGE) / (TOTAL - LUNGE);
          hamster.head.position.z = 0.38 + (1 - p) * 0.30;
          hamster.head.rotation.x = -(1 - p) * 0.42;
        } else {
          hamster.head.position.z = 0.38;
          hamster.head.rotation.x = 0;
          this._active   = false;
          this._t        = 0;
          this._cooldown = 5 + Math.random() * 8;
        }
        return;
      }

      if (this._cooldown > 0) return;

      // Test cursor ray against a sphere around the hamster's head in 3D
      const headWP = new THREE.Vector3();
      hamster.head.getWorldPosition(headWP);
      const ray = new THREE.Raycaster();
      ray.setFromCamera(mouseNDC, camera);
      const toHead = headWP.clone().sub(ray.ray.origin);
      const tca    = toHead.dot(ray.ray.direction);
      const d2     = toHead.dot(toHead) - tca * tca;
      const RADIUS = 0.55;
      if (d2 > RADIUS * RADIUS) return;

      if (Math.random() < delta * 0.18) {
        this._active = true;
        this._t      = 0;
        Sounds.snap();
        if (Math.random() < 0.45) {
          setTimeout(() => {
            const _p = arr => arr[Math.floor(Math.random() * arr.length)];
            Speech.say(_p([
              `Do not bring your hand so close. I am warning you.`,
              `That was a demonstration. Next time I will not miss.`,
              `Personal space. I require it.`,
              `I bit. Yes. That was intentional.`,
              `I am well within my rights to bite.`,
              `Consider that a formal warning.`,
            ]));
          }, 350);
        }
      }
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 7.4 — Size Change (occasional involuntary scaling)
  // ═══════════════════════════════════════════════════════════════════════════

  function _easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  const SizeChange = {
    _active:       false,
    _phase:        'idle',
    _t:            0,
    _target:       1,
    _holdDuration: 4,

    trigger() {
      if (this._active) return;
      if ([STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD].includes(SM.current)) return;
      this._active       = true;
      this._phase        = 'growing';
      this._t            = 0;
      this._holdDuration = 3 + Math.random() * 5;
      this._target       = Math.random() < 0.5
        ? 1.35 + Math.random() * 0.45   // grow
        : 0.45 + Math.random() * 0.25;  // shrink
      Sounds.resize(this._target > 1 ? 'up' : 'down');
      if (Math.random() < 0.55) {
        const _p  = arr => arr[Math.floor(Math.random() * arr.length)];
        const dir = this._target > 1 ? 'larger' : 'smaller';
        setTimeout(() => Speech.say(_p([
          `I appear to be getting ${dir}. I am not alarmed.`,
          `Do not be alarmed. This happens occasionally.`,
          `I am aware of what is happening to my size. I am managing it.`,
          `The size fluctuation is temporary. Probably.`,
          `I have chosen not to address the size situation at this time.`,
        ])), 550);
      }
    },

    update(delta) {
      if (!this._active) return;
      this._t += delta;
      const DUR = 0.85;
      if (this._phase === 'growing') {
        const s = THREE.MathUtils.lerp(1, this._target, _easeInOut(Math.min(this._t / DUR, 1)));
        hamster.group.scale.setScalar(s);
        if (this._t >= DUR) { this._phase = 'holding'; this._t = 0; }
      } else if (this._phase === 'holding') {
        if (this._t >= this._holdDuration) {
          this._phase = 'shrinking'; this._t = 0;
          Sounds.resize(this._target > 1 ? 'down' : 'up');
        }
      } else {
        const s = THREE.MathUtils.lerp(this._target, 1, _easeInOut(Math.min(this._t / DUR, 1)));
        hamster.group.scale.setScalar(s);
        if (this._t >= DUR) {
          hamster.group.scale.setScalar(1);
          this._active = false; this._phase = 'idle';
        }
      }
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 7.6 — Floor Damage (scratch marks that fade over time)
  // ═══════════════════════════════════════════════════════════════════════════

  const FloorDamage = {
    marks: [],

    spawn(position) {
      const cv  = document.createElement('canvas');
      cv.width  = cv.height = 128;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, 128, 128);
      const n = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) {
        const cx  = 64 + (Math.random() - 0.5) * 48;
        const cy  = 64 + (Math.random() - 0.5) * 48;
        const ang = (Math.random() - 0.5) * 0.9 + Math.PI / 2;
        const len = 18 + Math.random() * 45;
        ctx.strokeStyle = `rgba(10,4,0,${0.55 + Math.random() * 0.35})`;
        ctx.lineWidth   = 1 + Math.random() * 2.5;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - Math.cos(ang)*len/2, cy - Math.sin(ang)*len/2);
        ctx.lineTo(cx + Math.cos(ang)*len/2, cy + Math.sin(ang)*len/2);
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(cv);
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.72, depthWrite: false });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.58, 0.58), mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.rotation.z = Math.random() * Math.PI * 2;
      mesh.position.set(
        THREE.MathUtils.clamp(position.x + (Math.random()-0.5)*0.25, -3.5, 3.5),
        0.001,
        THREE.MathUtils.clamp(position.z + (Math.random()-0.5)*0.25, -2.5, 2.5),
      );
      scene.add(mesh);
      this.marks.push({ mesh, mat, born: Date.now() });
      this._save();
    },

    _save() {
      const data = this.marks.map(m => ({
        x: m.mesh.position.x, z: m.mesh.position.z,
        rz: m.mesh.rotation.z, born: m.born,
      }));
      localStorage.setItem('hamster_damage', JSON.stringify(data));
    },

    loadSaved() {
      try {
        const FADE_START = 25_000, FADE_DUR = 100_000;
        const now  = Date.now();
        const data = JSON.parse(localStorage.getItem('hamster_damage') || '[]');
        for (const { x, z, rz, born } of data) {
          const age = now - born;
          if (age >= FADE_START + FADE_DUR) continue; // already gone
          const opacity = 0.72 * Math.max(0, 1 - Math.max(0, age - FADE_START) / FADE_DUR);
          // Rebuild the canvas texture (simple scratch pattern, doesn't need to match exactly)
          const cv  = document.createElement('canvas');
          cv.width  = cv.height = 128;
          const ctx = cv.getContext('2d');
          ctx.clearRect(0, 0, 128, 128);
          ctx.strokeStyle = 'rgba(10,4,0,0.75)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
          for (let i = 0; i < 3; i++) {
            const ang = (Math.random()-0.5)*0.9 + Math.PI/2, len = 22 + Math.random()*40;
            const cx2 = 64+(Math.random()-0.5)*44, cy2 = 64+(Math.random()-0.5)*44;
            ctx.beginPath();
            ctx.moveTo(cx2-Math.cos(ang)*len/2, cy2-Math.sin(ang)*len/2);
            ctx.lineTo(cx2+Math.cos(ang)*len/2, cy2+Math.sin(ang)*len/2);
            ctx.stroke();
          }
          const mat  = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, opacity, depthWrite: false });
          const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.58, 0.58), mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.rotation.z = rz;
          mesh.position.set(x, 0.001, z);
          scene.add(mesh);
          this.marks.push({ mesh, mat, born });
        }
      } catch (e) { /* ignore malformed data */ }
    },

    update() {
      const FADE_START = 25_000;   // start fading after 25 real seconds
      const FADE_DUR   = 100_000;  // fade over ~100 real seconds
      const now = Date.now();
      for (let i = this.marks.length - 1; i >= 0; i--) {
        const m   = this.marks[i];
        const age = now - m.born;
        if (age > FADE_START) {
          m.mat.opacity = 0.72 * Math.max(0, 1 - (age - FADE_START) / FADE_DUR);
          if (m.mat.opacity <= 0) {
            scene.remove(m.mesh);
            this.marks.splice(i, 1);
            this._save();
          }
        }
      }
    },

    handleClick(clientX, clientY) {
      if (!this.marks.length) return false;
      const r = new THREE.Raycaster();
      r.setFromCamera(_screenToNDC(clientX, clientY), camera);
      // Widen threshold slightly — the decals are flat and easy to miss
      r.params.Mesh = { threshold: 0.08 };
      const hits = r.intersectObjects(this.marks.map(m => m.mesh), false);
      if (!hits.length) return false;
      const _p = arr => arr[Math.floor(Math.random() * arr.length)];
      Speech.say(_p([
        `I will not be telling you what I was doing there.`,
        `That area is not your concern. Please move along.`,
        `I cannot discuss the nature of that excavation at this time.`,
        `What was done there was done for reasons. I will not elaborate.`,
        `That is a private matter. I would ask you not to inspect it further.`,
        `I was looking for something. I will not say what. I will not say whether I found it.`,
        `The purpose of that work is confidential. I trust you understand.`,
        `Do not ask about that. You would not want to know. I am serious.`,
      ]));
      return true;
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 7.8 — Gift System (garish rock offerings)
  // ═══════════════════════════════════════════════════════════════════════════

  const GiftSystem = {
    _mesh: null,

    spawn() {
      this.remove();
      const GARISH = [0xff00ff, 0x00ff88, 0xff6600, 0x00ccff, 0xffff00,
                      0xff0066, 0xaaff00, 0xcc00ff, 0xff3300, 0x00aaff];
      const mat = new THREE.MeshStandardMaterial({
        color: GARISH[Math.floor(Math.random() * GARISH.length)],
        roughness: 0.22, metalness: 0.12,
      });
      const g = new THREE.Group();

      // Main body — distorted icosahedron
      const geo = new THREE.IcosahedronGeometry(0.12, 1);
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setXYZ(i,
          pos.getX(i) * (0.55 + Math.random() * 0.95),
          pos.getY(i) * (0.45 + Math.random() * 1.15),
          pos.getZ(i) * (0.55 + Math.random() * 0.95),
        );
      }
      geo.computeVertexNormals();
      g.add(new THREE.Mesh(geo, mat));

      // Lumps
      const lumps = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < lumps; i++) {
        const lg = new THREE.SphereGeometry(0.03 + Math.random() * 0.06, 5, 4);
        const lm = new THREE.Mesh(lg, mat);
        const a  = Math.random() * Math.PI * 2;
        const el = (Math.random() - 0.5) * Math.PI;
        const r  = 0.07 + Math.random() * 0.07;
        lm.position.set(Math.cos(a)*Math.cos(el)*r, Math.sin(el)*r*0.7, Math.sin(a)*Math.cos(el)*r);
        g.add(lm);
      }

      const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(hamster.group.quaternion);
      const gp  = hamster.group.position.clone().addScaledVector(fwd, 0.62);
      gp.y = 0.13;
      g.position.copy(gp);
      g.traverse(o => { if (o.isMesh) o.castShadow = true; });
      scene.add(g);
      this._mesh = g;
    },

    remove() {
      if (this._mesh) { scene.remove(this._mesh); this._mesh = null; }
    },

    handleClick(clientX, clientY) {
      if (!this._mesh || SM.current !== STATES.GIFT_OFFERING) return false;
      const r = new THREE.Raycaster();
      r.setFromCamera(_screenToNDC(clientX, clientY), camera);
      const meshes = [];
      this._mesh.traverse(o => { if (o.isMesh) meshes.push(o); });
      if (!r.intersectObjects(meshes, false).length) return false;
      this.remove();
      const _p = arr => arr[Math.floor(Math.random() * arr.length)];
      Speech.say(_p([
        `You have taken it. Good. It is yours now. Do not lose it.`,
        `I thought you would want it. I have had it for some time.`,
        `It is a fine specimen. You should feel honoured.`,
        `Good. Now we have an understanding. You are welcome.`,
        `I collected that myself. It took considerable effort.`,
      ]));
      SM.transition(STATES.IDLE);
      return true;
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 8 — Food / Item Drag
  // ═══════════════════════════════════════════════════════════════════════════

  const FoodDrag = {
    active:           false,
    clone:            null,
    stateAtDragStart: null,
    fromPile:         false,

    _doStart(e, sourceEl, fromPile) {
      this.active           = true;
      this.fromPile         = fromPile;
      this.stateAtDragStart = SM.current;
      this.clone            = sourceEl.cloneNode(true);
      Object.assign(this.clone.style, {
        position: 'fixed', pointerEvents: 'none', zIndex: '1000',
        transform: 'translate(-50%, -50%) scale(1.1)', cursor: 'grabbing',
        transition: 'none', opacity: '1',
      });
      document.body.appendChild(this.clone);
      this._move(e);
      e.preventDefault();
    },

    // Drag from the centre tray (LOTION / SUBSTANCE only)
    start(e) {
      if (![STATES.LOTION, STATES.SUBSTANCE].includes(SM.current)) return;
      this._doStart(e, document.getElementById('food-item'), false);
    },

    // Drag from the always-visible food pile
    startPile(e) {
      const blocked = [STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD, STATES.LOTION, STATES.SUBSTANCE];
      if (blocked.includes(SM.current)) return;
      this._doStart(e, document.getElementById('food-pile-icon'), true);
    },

    move(e)  { this._move(e); },
    _move(e) {
      if (!this.active || !this.clone) return;
      const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      const y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      this.clone.style.left = x + 'px';
      this.clone.style.top  = y + 'px';
    },

    drop(e) {
      if (!this.active) return;
      this.active = false;
      if (this.clone) { document.body.removeChild(this.clone); this.clone = null; }
      const x = e.clientX ?? e.changedTouches?.[0]?.clientX ?? 0;
      const y = e.clientY ?? e.changedTouches?.[0]?.clientY ?? 0;

      if (this.fromPile) {
        if (raycastHamster(x, y)) {
          feedHamster();
        } else {
          // Place on the floor at drop point
          const r = new THREE.Raycaster();
          r.setFromCamera(_screenToNDC(x, y), camera);
          const hit = new THREE.Vector3();
          if (r.ray.intersectPlane(floorPlane, hit)) {
            FloorFood.place(hit);
          }
        }
      } else {
        // Centre-tray drag (LOTION / SUBSTANCE)
        if (raycastHamster(x, y) && SM.current === this.stateAtDragStart) {
          deliverItem(this.stateAtDragStart);
        }
      }
    },
  };

  // Feed hamster from the food pile — works any time except when unavailable
  function feedHamster() {
    const blocked = [STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD, STATES.LOTION, STATES.SUBSTANCE];
    if (blocked.includes(SM.current)) return false;
    appState.stats.feedCount++;
    Persist.saveStats();
    Sounds.eat();
    const p = arr => arr[Math.floor(Math.random() * arr.length)];
    setTimeout(() => Speech.say(p([
      `Thank you. This is acceptable.`,
      `Mmm. Yes. That will do nicely.`,
      `Good. You may continue.`,
      `I accept this offering with measured gratitude.`,
      `Adequate. Quite adequate.`,
      `You have my acknowledgement.`,
      `This is satisfactory.`,
      `Yes. More of that.`,
    ])), 250 + Math.floor(Math.random() * 400));
    if (SM.current !== STATES.EATING) SM.transition(STATES.EATING);
    return true;
  }

  function deliverItem(state) {
    const p = arr => arr[Math.floor(Math.random() * arr.length)];
    if (state === STATES.LOTION) {
      appState.stats.lotionCount++;
      Persist.saveStats();
      SM.transition(STATES.IDLE);
      Sounds.lotion();
      setTimeout(() => Speech.say(p([
        `Mmm. That is most... satisfactory.`,
        `Yes. That is exactly what was needed. Thank you.`,
        `Apply it more thoroughly next time. But this will suffice for now.`,
        `The lotion has been applied. I am temporarily at ease.`,
        `Adequate. You may go.`,
      ])), 300);
    } else if (state === STATES.SUBSTANCE) {
      appState.stats.substanceCount++;
      Persist.saveStats();
      SM.transition(STATES.SLEEPING, { duration: (15 + Math.random() * 30) * 60 });
      setTimeout(() => Speech.say(p([
        `I will sleep now. Do not disturb me under any circumstances.`,
        `The substance has been received. I require rest. Do not wake me.`,
        `Good. I will return when I am ready. Do not attempt to rush this process.`,
      ])), 500);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 8.5 — Floor Food (food placed on the floor from pile)
  // ═══════════════════════════════════════════════════════════════════════════

  const FloorFood = {
    items: [],
    _geo:  null,
    _mat:  null,

    _ensure() {
      if (!this._geo) this._geo = new THREE.SphereGeometry(0.06, 6, 4);
      if (!this._mat) this._mat = new THREE.MeshLambertMaterial({ color: 0xd4a847 });
    },

    place(worldPos) {
      this._ensure();
      const mesh = new THREE.Mesh(this._geo, this._mat);
      mesh.position.set(
        THREE.MathUtils.clamp(worldPos.x, -2.8, 2.8),
        0.06,
        THREE.MathUtils.clamp(worldPos.z, -1.5, 1.5),
      );
      scene.add(mesh);
      this.items.push({ mesh });
      this._save();
    },

    nearest() {
      if (this.items.length === 0) return null;
      let best = null, bestD = Infinity;
      const hp = hamster.group.position;
      for (const item of this.items) {
        const d = hp.distanceTo(item.mesh.position);
        if (d < bestD) { bestD = d; best = item; }
      }
      return best;
    },

    remove(item) {
      scene.remove(item.mesh);
      const idx = this.items.indexOf(item);
      if (idx >= 0) this.items.splice(idx, 1);
      this._save();
    },

    _save() {
      const data = this.items.map(f => ({ x: f.mesh.position.x, z: f.mesh.position.z }));
      localStorage.setItem('hamster_floor_food', JSON.stringify(data));
    },

    loadSaved() {
      this._ensure();
      try {
        const data = JSON.parse(localStorage.getItem('hamster_floor_food') || '[]');
        for (const { x, z } of data) {
          const mesh = new THREE.Mesh(this._geo, this._mat);
          mesh.position.set(x, 0.06, z);
          scene.add(mesh);
          this.items.push({ mesh });
        }
      } catch (e) { /* ignore malformed data */ }
    },
  };

  function updateFoodTray() {
    const tray = document.getElementById('food-tray');
    const item = document.getElementById('food-item');
    // Tray is only shown for LOTION and SUBSTANCE — food pile handles regular feeding
    const icons = {
      [STATES.LOTION]:    '🧴',
      [STATES.SUBSTANCE]: '🌿',
    };
    const icon = icons[SM.current];
    if (icon) { item.textContent = icon; tray.style.display = 'block'; }
    else       { tray.style.display = 'none'; }
  }

  function updateFoodPile() {
    const icon = document.getElementById('food-pile-icon');
    if (!icon) return;
    icon.textContent = FOOD_ICONS[appState.foodType] || '🌻';
    const blocked = [STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD, STATES.LOTION, STATES.SUBSTANCE];
    icon.classList.toggle('unavailable', blocked.includes(SM.current));
  }

  function updateStatusDot() {
    const dot = document.getElementById('status-dot');
    const colors = {
      [STATES.HUNGRY]:    '#cc6622',
      [STATES.WORRIED]:   '#cc2222',
      [STATES.LOTION]:    '#4488cc',
      [STATES.SUBSTANCE]: '#8844cc',
      [STATES.SLEEPING]:  '#336633',
      [STATES.NAP]:       '#445544',
    };
    dot.style.background = colors[SM.current] || '#3a2a1a';
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 8.7 — Item Pickup (pick up bugs / floor food / poop, drop or bin)
  // ═══════════════════════════════════════════════════════════════════════════

  const ItemPickup = {
    active:           false,
    held:             null,    // { kind:'poop'|'food'|'bug', ref, mesh }
    ghost:            null,    // floating DOM emoji
    _droppedThisCycle: false,  // guards play-dead wobble click handler

    tryStart(clientX, clientY) {
      this._droppedThisCycle = false;
      if (this.active || FoodDrag.active) return false;

      const r = new THREE.Raycaster();
      r.setFromCamera(_screenToNDC(clientX, clientY), camera);

      // ── Poop pellets ──
      const poopMeshes = PoopSystem.pellets.map(p => p.mesh);
      let hits = r.intersectObjects(poopMeshes, false);
      if (hits.length) {
        const ref = PoopSystem.pellets.find(p => p.mesh === hits[0].object);
        if (ref) return this._begin({ kind: 'poop', ref, mesh: ref.mesh }, clientX, clientY);
      }

      // ── Floor food ──
      const foodMeshes = FloorFood.items.map(f => f.mesh);
      hits = r.intersectObjects(foodMeshes, false);
      if (hits.length) {
        const ref = FloorFood.items.find(f => f.mesh === hits[0].object);
        if (ref) return this._begin({ kind: 'food', ref, mesh: ref.mesh }, clientX, clientY);
      }

      // ── Bugs (Groups — need recursive intersect) ──
      const bugGroups = BugSystem.bugs
        .filter(b => b.state === 'wandering' && b.mesh)
        .map(b => b.mesh);
      hits = r.intersectObjects(bugGroups, true);
      if (hits.length) {
        // Walk up to the scene-level group
        let node = hits[0].object;
        while (node.parent && node.parent !== scene) node = node.parent;
        const ref = BugSystem.bugs.find(b => b.mesh === node);
        if (ref && ref.state === 'wandering')
          return this._begin({ kind: 'bug', ref, mesh: node }, clientX, clientY);
      }

      return false;
    },

    _begin(item, clientX, clientY) {
      this.active = true;
      this.held   = item;
      item.mesh.visible = false;
      if (item.kind === 'bug') item.ref.state = 'held';

      // Emoji ghost follows cursor
      const icons = {
        poop: '💩',
        food: FOOD_ICONS[appState.foodType] || '🌻',
        bug:  '🦗',
      };
      this.ghost = document.createElement('div');
      Object.assign(this.ghost.style, {
        position: 'fixed', pointerEvents: 'none', zIndex: '1001',
        transform: 'translate(-50%,-60%)',
        fontSize: '26px', userSelect: 'none',
      });
      this.ghost.textContent = icons[item.kind];
      document.body.appendChild(this.ghost);
      this._moveGhost(clientX, clientY);

      // Show bin as a live drop target
      document.getElementById('bin-zone').classList.add('bin-live');
      return true;
    },

    move(clientX, clientY) {
      if (!this.active) return;
      this._moveGhost(clientX, clientY);
      const over = this._overBin(clientX, clientY);
      document.getElementById('bin-zone').classList.toggle('bin-hover', over);
    },

    drop(clientX, clientY) {
      if (!this.active) return;
      this.active            = false;
      this._droppedThisCycle = true;
      if (this.ghost) { document.body.removeChild(this.ghost); this.ghost = null; }
      const bin = document.getElementById('bin-zone');
      bin.classList.remove('bin-live', 'bin-hover');

      if (this._overBin(clientX, clientY)) {
        this._discard();
      } else if (this.held.kind === 'bug' && raycastHamster(clientX, clientY)) {
        // Feed bug directly to hamster
        const bug = this.held.ref;
        scene.remove(bug.mesh);
        bug.state = 'eaten';
        const notEating = ![STATES.SLEEPING, STATES.NAP, STATES.PLAY_DEAD,
                            STATES.LOTION, STATES.SUBSTANCE].includes(SM.current);
        if (notEating) SM.transition(STATES.EATING_BUG, { bug });
      } else {
        const rc = new THREE.Raycaster();
        rc.setFromCamera(_screenToNDC(clientX, clientY), camera);
        const hit = new THREE.Vector3();
        if (rc.ray.intersectPlane(floorPlane, hit)) {
          this._placeAt(hit);
        } else {
          this._restore();   // off-screen — put back where it was
        }
      }
      this.held = null;
    },

    _moveGhost(x, y) {
      if (this.ghost) { this.ghost.style.left = x + 'px'; this.ghost.style.top = y + 'px'; }
    },

    _overBin(clientX, clientY) {
      const r = document.getElementById('bin-zone').getBoundingClientRect();
      return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
    },

    _discard() {
      const { kind, ref, mesh } = this.held;
      scene.remove(mesh);
      if (kind === 'poop') {
        const idx = PoopSystem.pellets.indexOf(ref);
        if (idx >= 0) PoopSystem.pellets.splice(idx, 1);
        appState.stats.poopPickedUp++;
        Persist.saveStats();
        if (!PoopSystem.pellets.length) PoopSystem._nagLevel = 0;
        PoopSystem._save();
      } else if (kind === 'food') {
        const idx = FloorFood.items.indexOf(ref);
        if (idx >= 0) FloorFood.items.splice(idx, 1);
      } else if (kind === 'bug') {
        ref.state = 'eaten';   // BugSystem.update() splices it out next tick
      }
    },

    _placeAt(worldPos) {
      const { kind, ref, mesh } = this.held;
      const x = THREE.MathUtils.clamp(worldPos.x, -2.8,  2.8);
      const z = THREE.MathUtils.clamp(worldPos.z, -1.5,  1.5);
      mesh.visible = true;
      if (kind === 'poop') {
        mesh.position.set(x, 0.042, z);
        // Moving poop resets its age so it doesn't crawl away immediately
        if (ref.hasLegs) {
          ref.legMeshes.forEach(l => mesh.remove(l));
          ref.legMeshes = []; ref.hasLegs = false; ref.crawlDir = null;
        }
        ref.spawnedAt = Date.now();
      } else if (kind === 'food') {
        mesh.position.set(x, 0.06, z);
        FloorFood._save();
      } else if (kind === 'bug') {
        mesh.position.set(x, 0.02, z);
        ref.state = 'wandering';
      }
    },

    _restore() {
      if (!this.held) return;
      this.held.mesh.visible = true;
      if (this.held.kind === 'bug') this.held.ref.state = 'wandering';
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 9 — Raycasting helpers
  // ═══════════════════════════════════════════════════════════════════════════

  function _screenToNDC(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    return new THREE.Vector2(
      ((clientX - rect.left) / rect.width)  *  2 - 1,
      -((clientY - rect.top)  / rect.height) *  2 + 1,
    );
  }

  function raycastHamster(clientX, clientY) {
    const r = new THREE.Raycaster();
    r.setFromCamera(_screenToNDC(clientX, clientY), camera);
    const meshes = [];
    hamster.group.traverse(o => { if (o.isMesh) meshes.push(o); });
    const hits = r.intersectObjects(meshes, false);
    return hits.length > 0 ? hits[0] : null;
  }

  function raycastObjects(clientX, clientY, objects) {
    const r = new THREE.Raycaster();
    r.setFromCamera(_screenToNDC(clientX, clientY), camera);
    return r.intersectObjects(objects, false);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 10 — Textures (Phase 1)
  // ═══════════════════════════════════════════════════════════════════════════

  function makeFurTexture(baseHex) {
    const r0 = (baseHex >> 16) & 0xff;
    const g0 = (baseHex >>  8) & 0xff;
    const b0 =  baseHex        & 0xff;
    const cv = document.createElement('canvas');
    cv.width = cv.height = 256;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = `rgb(${r0},${g0},${b0})`;
    ctx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 2400; i++) {
      const x  = Math.random() * 256, y = Math.random() * 256;
      const a  = (Math.random() - 0.5) * 1.2;
      const l  = 3 + Math.random() * 7;
      const dl = (Math.random() - 0.5) * 50;
      ctx.strokeStyle = `rgba(${Math.round(r0+dl)},${Math.round(g0+dl*0.5)},${Math.round(b0+dl*0.2)},0.45)`;
      ctx.lineWidth   = 0.7 + Math.random() * 0.8;
      ctx.beginPath(); ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(a) * l, y + Math.sin(a) * l);
      ctx.stroke();
    }
    return new THREE.CanvasTexture(cv);
  }

  function makeWoodTexture() {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 512;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#5a3a1a'; ctx.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 90; i++) {
      const y  = Math.random() * 512;
      const dl = (Math.random() - 0.5) * 35;
      ctx.strokeStyle = `rgba(${Math.round(90+dl)},${Math.round(58+dl*0.6)},${Math.round(26+dl*0.3)},0.55)`;
      ctx.lineWidth = 0.8 + Math.random() * 2.5;
      ctx.beginPath(); ctx.moveTo(0, y + (Math.random()-0.5)*20);
      ctx.bezierCurveTo(128, y+(Math.random()-0.5)*12, 384, y+(Math.random()-0.5)*12, 512, y+(Math.random()-0.5)*20);
      ctx.stroke();
    }
    return new THREE.CanvasTexture(cv);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 11 — Scene Setup (Phase 1)
  // ═══════════════════════════════════════════════════════════════════════════

  function initScene() {

    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 6),

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 12 — Hamster Mesh (Phase 1)
  // ═══════════════════════════════════════════════════════════════════════════

  function initHamster() {
    const furTex    = makeFurTexture(0xc8873a);
    const furMat    = new THREE.MeshStandardMaterial({ color: 0xc8873a, roughness: 0.8, map: furTex });
    const bellyMat  = new THREE.MeshStandardMaterial({ color: 0xeac080, roughness: 0.9 });
    const eyeMat    = new THREE.MeshStandardMaterial({ color: 0x0d0602, roughness: 0.2, metalness: 0.3 });
    const eyeHiMat  = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, emissive: 0xffffff, emissiveIntensity: 0.3 });
    const earInMat  = new THREE.MeshStandardMaterial({ color: 0xe8a0a0, roughness: 0.9 });
    const noseMat   = new THREE.MeshStandardMaterial({ color: 0xcc7070, roughness: 0.8 });

    hamster.group = new THREE.Group();
    scene.add(hamster.group);

    function S(mesh) { mesh.castShadow = true; return mesh; }

    hamster.body = S(new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), furMat));
    hamster.body.scale.set(1.3, 0.9, 1.1);
    hamster.body.position.set(0, 0.45, 0);
    hamster.group.add(hamster.body);

    hamster.head = S(new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 12), furMat));
    hamster.head.position.set(0, 0.80, 0.38);
    hamster.group.add(hamster.head);

    hamster.snout = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 7), furMat);
    hamster.snout.scale.set(1.1, 0.78, 0.85);
    hamster.snout.position.set(0, -0.06, 0.30);
    hamster.head.add(hamster.snout);

    const nGeo = new THREE.SphereGeometry(0.038, 6, 4);
    const nL = new THREE.Mesh(nGeo, noseMat); nL.position.set(-0.045, 0.02, 0.13); hamster.snout.add(nL);
    const nR = new THREE.Mesh(nGeo, noseMat); nR.position.set( 0.045, 0.02, 0.13); hamster.snout.add(nR);

    function makeEye(side) {
      const g = new THREE.Group();
      g.position.set(side * 0.18, 0.06, 0.28);
      hamster.head.add(g);
      g.add(new THREE.Mesh(new THREE.SphereGeometry(0.072, 10, 7), eyeMat));
      const hi = new THREE.Mesh(new THREE.SphereGeometry(0.026, 6, 4), eyeHiMat);
      hi.position.set(side * -0.025, 0.034, 0.062); g.add(hi);
      return g;
    }
    hamster.eyeL = makeEye(-1); hamster.eyeR = makeEye(1);

    function makeEar(side) {
      const g = new THREE.Group();
      g.position.set(side * 0.26, 0.24, 0.04);
      g.rotation.z = side * -0.15;
      hamster.head.add(g);
      const outer = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 6), furMat);
      outer.scale.set(0.65, 1.0, 0.38); g.add(outer);
      const inner = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6), earInMat);
      inner.scale.set(0.45, 0.75, 0.28); inner.position.z = 0.01; g.add(inner);
      return g;
    }
    hamster.earL = makeEar(-1); hamster.earR = makeEar(1);

    function makeCheek(side) {
      const c = S(new THREE.Mesh(new THREE.SphereGeometry(0.21, 10, 7), bellyMat));
      c.position.set(side * 0.34, 0.52, 0.28);
      c.scale.set(1.0, 0.85, 0.9);
      hamster.group.add(c); return c;
    }
    hamster.cheekL = makeCheek(-1); hamster.cheekR = makeCheek(1);

    hamster.belly = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 7), bellyMat);
    hamster.belly.scale.set(1.0, 0.75, 0.45);
    hamster.belly.position.set(0, 0.44, 0.52);
    hamster.group.add(hamster.belly);

    function makeLeg(x, z, r, len, tilt) {
      const leg = S(new THREE.Mesh(new THREE.CapsuleGeometry(r, len, 4, 8), furMat));
      leg.position.set(x, r + len * 0.18, z);
      leg.rotation.z = tilt;
      hamster.group.add(leg); return leg;
    }
    hamster.legFL = makeLeg(-0.24,  0.30, 0.058, 0.11,  0.22);
    hamster.legFR = makeLeg( 0.24,  0.30, 0.058, 0.11, -0.22);
    hamster.legBL = makeLeg(-0.26, -0.24, 0.068, 0.13,  0.18);
    hamster.legBR = makeLeg( 0.26, -0.24, 0.068, 0.13, -0.18);

    hamster.tail = new THREE.Mesh(new THREE.SphereGeometry(0.065, 6, 4), bellyMat);
    hamster.tail.position.set(0, 0.36, -0.60);
    hamster.group.add(hamster.tail);

    hamster.group.position.set(0, 0, 0);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 13 — Eye Tracking (Phase 1)
  // ═══════════════════════════════════════════════════════════════════════════

  function getMouseWorld() {
    raycaster.setFromCamera(mouseNDC, camera);
    const hit = new THREE.Vector3();
    return raycaster.ray.intersectPlane(floorPlane, hit) ? hit : null;
  }

  const _hwp = new THREE.Vector3();
  const _hwq = new THREE.Quaternion();

  function updateEyeTracking(delta) {
    if (!eyeTrackingEnabled) return;
    const target = getMouseWorld();
    if (!target) return;
    hamster.head.getWorldPosition(_hwp);
    const dir = target.clone().sub(_hwp).normalize();
    hamster.head.getWorldQuaternion(_hwq);
    const local = dir.clone().applyQuaternion(_hwq.clone().invert());
    const MAX_E = THREE.MathUtils.degToRad(25);
    const MAX_H = THREE.MathUtils.degToRad(18);
    const ey = THREE.MathUtils.clamp(Math.atan2(local.x, local.z),  -MAX_E, MAX_E);
    const ep = THREE.MathUtils.clamp(Math.atan2(-local.y, local.z), -MAX_E, MAX_E);
    const lf = 1 - Math.pow(0.002, delta);
    hamster.eyeL.rotation.y = THREE.MathUtils.lerp(hamster.eyeL.rotation.y, ey, lf);
    hamster.eyeL.rotation.x = THREE.MathUtils.lerp(hamster.eyeL.rotation.x, ep, lf);
    hamster.eyeR.rotation.y = THREE.MathUtils.lerp(hamster.eyeR.rotation.y, ey, lf);
    hamster.eyeR.rotation.x = THREE.MathUtils.lerp(hamster.eyeR.rotation.x, ep, lf);
    const hy = THREE.MathUtils.clamp(Math.atan2(dir.x, dir.z), -MAX_H, MAX_H);
    hamster.head.rotation.y = THREE.MathUtils.lerp(hamster.head.rotation.y, hy, lf * 0.25);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 14 — Animation Tick
  // ═══════════════════════════════════════════════════════════════════════════

  function tickAnimation(t, delta) {
    const sleeping = SM.current === STATES.SLEEPING || SM.current === STATES.NAP;

    // Breathing (overridden by sleeping state which sets its own)
    if (!sleeping && SM.current !== STATES.EATING) {
      hamster.body.scale.y = 0.9 + Math.sin(t * 0.3 * Math.PI * 2) * 0.03;
    }

    // Subtle whole-group float (only when not in special pose)
    if (SM.current === STATES.IDLE || SM.current === STATES.LOOKING) {
      hamster.group.position.y = Math.sin(t * 0.6 * Math.PI * 2) * 0.003;
    }

    // Blink (skip when sleeping or blinking is irrelevant)
    if (!sleeping && SM.current !== STATES.PLAY_DEAD) {
      blinkTimer -= delta;
      if (blinkTimer <= 0 && blinkPhase === 'open') { blinkPhase = 'closing'; blinkT = 0; }
      if (blinkPhase === 'closing') {
        blinkT += delta / 0.07;
        const p = Math.min(blinkT, 1);
        hamster.eyeL.scale.y = 1 - p * 0.92;
        hamster.eyeR.scale.y = 1 - p * 0.92;
        if (blinkT >= 1) { blinkPhase = 'opening'; blinkT = 0; }
      }
      if (blinkPhase === 'opening') {
        blinkT += delta / 0.09;
        const p = Math.min(blinkT, 1);
        hamster.eyeL.scale.y = 0.08 + p * 0.92;
        hamster.eyeR.scale.y = 0.08 + p * 0.92;
        if (blinkT >= 1) {
          hamster.eyeL.scale.y = hamster.eyeR.scale.y = 1;
          blinkPhase = 'open';
          blinkTimer = 3 + Math.random() * 5;
        }
      }
    }

    // Walk animation (legs swing when moving)
    if (isWalking) {
      walkTime += delta;
      const freq  = SM.current === STATES.WORRIED ? 5.5 : 3.5;
      const amp   = 0.42;
      const p     = walkTime * freq * Math.PI * 2;
      hamster.legFL.rotation.x =  Math.sin(p) * amp;
      hamster.legBR.rotation.x =  Math.sin(p) * amp;
      hamster.legFR.rotation.x = -Math.sin(p) * amp;
      hamster.legBL.rotation.x = -Math.sin(p) * amp;
      hamster.body.position.y  = 0.45 + Math.abs(Math.sin(p * 2)) * 0.014;
    } else {
      // Return legs to rest
      const lf = 1 - Math.pow(0.01, delta);
      hamster.legFL.rotation.x = THREE.MathUtils.lerp(hamster.legFL.rotation.x, 0, lf);
      hamster.legFR.rotation.x = THREE.MathUtils.lerp(hamster.legFR.rotation.x, 0, lf);
      hamster.legBL.rotation.x = THREE.MathUtils.lerp(hamster.legBL.rotation.x, 0, lf);
      hamster.legBR.rotation.x = THREE.MathUtils.lerp(hamster.legBR.rotation.x, 0, lf);
      if (SM.current !== STATES.EATING) {
        hamster.body.position.y = THREE.MathUtils.lerp(hamster.body.position.y, 0.45, lf);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 15 — Camera Update
  // ═══════════════════════════════════════════════════════════════════════════

  function updateCamera(delta) {
    const lf = 1 - Math.pow(0.008, delta);
    camera.position.lerp(camTargetPos, lf);
    camCurrentLookAt.lerp(camTargetLookAt, lf);
    camera.lookAt(camCurrentLookAt);

    // Jitter during worried
    if (SM.current === STATES.WORRIED) {
      camera.position.x += (Math.random() - 0.5) * 0.007;
      camera.position.y += (Math.random() - 0.5) * 0.004;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 16 — Main Loop
  // ═══════════════════════════════════════════════════════════════════════════

  function mainLoop(ts) {
    requestAnimationFrame(mainLoop);

    const delta = Math.min((ts - lastTS) / 1000, 0.1);
    lastTS       = ts;
    totalTime   += delta;

    SM.update(delta);
    Scheduler.tick();
    tickAnimation(totalTime, delta);
    updateEyeTracking(delta);
    BiteSystem.update(delta);
    SizeChange.update(delta);
    PoopSystem.update(delta);
    BugSystem.update(delta);
    FloorDamage.update();

    renderer.render(scene, camera);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 17 — Input
  // ═══════════════════════════════════════════════════════════════════════════

  window.addEventListener('mousemove', (e) => {
    mouseNDC.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouseNDC.y = -(e.clientY / window.innerHeight)  * 2 + 1;
    FoodDrag.move(e);
    ItemPickup.move(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', (e) => {
    FoodDrag.drop(e);
    ItemPickup.drop(e.clientX, e.clientY);
  });
  window.addEventListener('touchmove', (e) => {
    FoodDrag.move(e);
    if (e.touches[0]) ItemPickup.move(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  window.addEventListener('touchend', (e) => {
    FoodDrag.drop(e);
    const t = e.changedTouches[0];
    if (t) ItemPickup.drop(t.clientX, t.clientY);
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Visibility: pause RAF accumulation
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) lastTS = performance.now();
  });

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 18 — UI Init
  // ═══════════════════════════════════════════════════════════════════════════

  function initUI() {
    // Centre tray (LOTION / SUBSTANCE)
    const item = document.getElementById('food-item');
    item.addEventListener('mousedown',  (e) => FoodDrag.start(e));
    item.addEventListener('touchstart', (e) => FoodDrag.start(e), { passive: false });

    // Always-visible food pile (bottom-right)
    const pile = document.getElementById('food-pile-icon');
    pile.addEventListener('mousedown',  (e) => FoodDrag.startPile(e));
    pile.addEventListener('touchstart', (e) => FoodDrag.startPile(e), { passive: false });

    // Canvas: mousedown to pick up world items (bugs / food / poop)
    renderer.domElement.addEventListener('mousedown', (e) => {
      if (e.button === 0) ItemPickup.tryStart(e.clientX, e.clientY);
    });
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches[0]) ItemPickup.tryStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // Canvas: click for gift acceptance and play-dead wobble
    renderer.domElement.addEventListener('click', (e) => {
      if (ItemPickup._droppedThisCycle) return;
      if (GiftSystem.handleClick(e.clientX, e.clientY)) return;
      if (FloorDamage.handleClick(e.clientX, e.clientY)) return;
      if (SM.current === STATES.PLAY_DEAD && raycastHamster(e.clientX, e.clientY)) {
        wobbleActive = true;
        wobbleT      = 0;
      }
    });

    // Double-click: summon to front
    renderer.domElement.addEventListener('dblclick', () => {
      if ([STATES.SLEEPING, STATES.PLAY_DEAD].includes(SM.current)) return;

      SM.transition(STATES.WANDERING, { summonToLook: true });

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 19 — Dev Console
  // ═══════════════════════════════════════════════════════════════════════════

  const DevConsole = {
    el: null, out: null, inp: null,
    history: [], histIdx: -1, isOpen: false,

    init() {
      this.el  = document.getElementById('dev-console');
      this.out = document.getElementById('dev-output');
      this.inp = document.getElementById('dev-input');

      this.inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const cmd = this.inp.value.trim();
          if (cmd) {
            this.history.unshift(cmd);
            this.histIdx = -1;
            this._line(`> ${cmd}`, 'cmd');
            this.exec(cmd);
            this.inp.value = '';
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          this.histIdx = Math.min(this.histIdx + 1, this.history.length - 1);
          this.inp.value = this.history[this.histIdx] ?? '';
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          this.histIdx = Math.max(this.histIdx - 1, -1);
          this.inp.value = this.histIdx >= 0 ? this.history[this.histIdx] : '';
        } else if (e.key === 'Escape' || e.key === '`') {
          e.preventDefault();
          this.toggle();
        }
        e.stopPropagation();
      });

      // Backtick toggles console open/closed
      window.addEventListener('keydown', (e) => {
        if (e.key === '`') { e.preventDefault(); this.toggle(); }
      });

      this._line('dev console  —  type help', 'muted');
    },

    toggle() {
      this.isOpen = !this.isOpen;
      this.el.classList.toggle('open', this.isOpen);
      document.body.classList.toggle('console-open', this.isOpen);
      if (this.isOpen) {
        this.inp.focus();
        document.getElementById('dev-toggle-hint').style.display = 'none';
      } else {
        document.getElementById('dev-toggle-hint').style.display = '';
      }
    },

    _line(text, cls = '') {
      const d = document.createElement('div');
      if (cls) d.classList.add(cls);
      d.textContent = text;
      this.out.appendChild(d);
      this.out.scrollTop = this.out.scrollHeight;
    },
    ok  (msg) { this._line(msg, 'ok');   },
    err (msg) { this._line(msg, 'err');  },
    info(msg) { this._line(msg, 'info'); },

    exec(raw) {
      const parts = raw.trim().split(/\s+/);
      const verb  = parts[0].toLowerCase();
      const arg   = parts[1];
      const argN  = parseFloat(arg);

      const noInterrupt = () => [STATES.SLEEPING, STATES.PLAY_DEAD].includes(SM.current);

      const CMDS = {
        help: () => {
          this.info('── states ──────────────────────────────────────────');
          this.info('  idle  wander  out  look  hungry  lotion  substance');
          this.info('  worried  sleep [min]  nap  dead  poop  eat  eating_bug');
          this.info('  dig  gift  size');
          this.info('── utils ───────────────────────────────────────────');
          this.info('  bug         spawn a bug');
          this.info('  legs        grow legs on all poop pellets now');
          this.info('  scale [n]   get/set TIME_SCALE');
          this.info('  pace [n]    get/set paceConsole (× paceAuto = event rate multiplier)');
          this.info('  stats       current state & counters');
          this.info('  pos         hamster position & rotation');
          this.info('  cam         camera position');
          this.info('  reset       idle + center + clear bugs & poop');
          this.info('  clear       wipe all localStorage (requires confirmation)');
          this.info('  eye [on|off] force eye-tracking on/off');
          this.info('  walk [on|off] force walk animation on/off');
          this.info('── speech ──────────────────────────────────────────');
          this.info('  name [n]    get/set user name');
          this.info('  speak       trigger a random Markov utterance');
          this.info('  say [text]  speak arbitrary text (with name prefix)');
          this.info('  armed       trigger a gun/traps/police remark');
          this.info('  verse       trigger a religious verse quotation');
        },

        idle:      () => { SM.transition(STATES.IDLE);                                                          this.ok('→ idle'); },
        wander:    () => { startWander(false);                                                                   this.ok('→ wandering'); },
        out:       () => { startWander(true);                                                                    this.ok('→ wander (out of shot)'); },
        look:      () => { SM.transition(STATES.LOOKING, { duration: 30 + Math.random() * 60 });                this.ok('→ looking'); },
        hungry:    () => { SM.transition(STATES.HUNGRY);                                                         this.ok('→ hungry — drag food onto hamster'); },
        lotion:    () => { SM.transition(STATES.LOTION);                                                         this.ok('→ lotion demand — drag 🧴 onto hamster'); },
        substance: () => { SM.transition(STATES.SUBSTANCE);                                                      this.ok('→ substance demand — drag 🌿 onto hamster'); },
        worried:   () => { SM.transition(STATES.WORRIED,  { duration: 30 + Math.random() * 45 });               this.ok('→ worried'); },
        sleep:     () => { const m = isNaN(argN) ? 1 : argN; SM.transition(STATES.SLEEPING, { duration: m*60 }); this.ok(`→ sleeping ${m} min`); },
        nap:       () => { SM.transition(STATES.NAP,  { duration: 15 + Math.random() * 20 });                   this.ok('→ nap'); },
        dead:      () => { SM.transition(STATES.PLAY_DEAD, { duration: 30 });                                    this.ok('→ play dead — click hamster to wobble'); },
        poop:      () => { SM.transition(STATES.POOPING);                                                        this.ok('→ pooping'); },
        eat:       () => { SM.transition(STATES.EATING);                                                         this.ok('→ eating'); },
        eating_bug:() => {
          const bug = BugSystem.bugs[0];
          SM.transition(STATES.EATING_BUG, bug ? { bug } : {});
          this.ok('→ eating bug' + (bug ? '' : ' (no bugs present)'));
        },

        dig:  () => { SM.transition(STATES.DIGGING, { duration: 4 + Math.random() * 4 }); this.ok('→ digging'); },
        gift: () => { SM.transition(STATES.GIFT_OFFERING); this.ok('→ gift offering — click the rock to accept it'); },
        size: () => { SizeChange.trigger(); this.ok('→ size change triggered'); },

        bug: () => {
          BugSystem.spawnBug();
          this.ok(`→ bug spawned  (total: ${BugSystem.bugs.length})`);
        },

        legs: () => {
          const n = PoopSystem.pellets.filter(p => !p.hasLegs).length;
          PoopSystem.pellets.forEach(p => { if (!p.hasLegs) PoopSystem._growLegs(p); });
          this.ok(`→ grew legs on ${n} pellet(s)`);
        },

        scale: () => {
          if (!isNaN(argN) && argN > 0) {
            TIME_SCALE = argN;
            this.ok(`TIME_SCALE = ${TIME_SCALE}  (effective pace = ${pace().toFixed(2)}x)`);
          } else {
            this.info(`TIME_SCALE = ${TIME_SCALE}  (1 = real time, 720 = 1s per 12min)`);
          }
        },

        pace: () => {
          if (!isNaN(argN) && argN > 0) {
            paceConsole = argN;
            this.ok(`paceConsole = ${paceConsole}  paceAuto = ${paceAuto().toFixed(2)}  total = ${pace().toFixed(2)}`);
          } else {
            this.info(`paceConsole: ${paceConsole}  paceAuto: ${paceAuto().toFixed(2)}  total: ${pace().toFixed(2)}`);
            this.info(`  (events scheduled at TIME_SCALE × pace = ${(TIME_SCALE * pace()).toFixed(1)}x real time)`);
          }
        },

        stats: () => {
          this.info(`state: ${SM.current}  timer: ${SM.timer.toFixed(1)}s`);
          this.info(`eyeTracking: ${eyeTrackingEnabled}  isWalking: ${isWalking}`);
          this.info(`feeds: ${appState.stats.feedCount}  lotion: ${appState.stats.lotionCount}  substance: ${appState.stats.substanceCount}  poop: ${appState.stats.poopPickedUp}`);
          this.info(`pellets: ${PoopSystem.pellets.length}  bugs: ${BugSystem.bugs.length}`);
          this.info(`wander path: ${wanderPath.length} pts, idx ${wanderIdx}`);
          this.info(`scheduler events: ${Scheduler.events.map(e => e.id).join(', ')}`);
          this.info(`voice: ${Speech.voice ? Speech.voice.name : '(none)'}  name: ${appState.userName}`);
          this.info(`paceConsole: ${paceConsole}  paceAuto: ${paceAuto().toFixed(2)}  total: ${pace().toFixed(2)}`);
          this.info(`session uptime: ${_fmtTime(sessionSec())}  total uptime: ${_fmtTime(totalSec())}`);
          this.info(`first run: ${appState.firstRun ? Persist.daysSinceFirstRun().toFixed(1) + ' days ago' : 'never'}`);
          this.info(`milestones reached: ${appState.milestones.length > 0 ? appState.milestones.join(', ') : '(none)'}`);
        },

        pos: () => {
          const p = hamster.group.position;
          const r = hamster.group.rotation;
          this.info(`pos  x:${p.x.toFixed(2)}  y:${p.y.toFixed(2)}  z:${p.z.toFixed(2)}`);
          this.info(`rot  y:${(r.y * 180/Math.PI).toFixed(1)}°  z:${(r.z * 180/Math.PI).toFixed(1)}°`);
        },

        cam: () => {
          const p = camera.position;
          this.info(`cam  x:${p.x.toFixed(2)}  y:${p.y.toFixed(2)}  z:${p.z.toFixed(2)}`);
          this.info(`target  x:${camTargetPos.x.toFixed(2)}  y:${camTargetPos.y.toFixed(2)}  z:${camTargetPos.z.toFixed(2)}`);
        },

        eye: () => {
          if (arg === 'on')  { eyeTrackingEnabled = true;  this.ok('eye tracking: on');  }
          else if (arg === 'off') { eyeTrackingEnabled = false; this.ok('eye tracking: off'); }
          else this.info(`eye tracking: ${eyeTrackingEnabled}`);
        },

        walk: () => {
          if (arg === 'on')  { isWalking = true;  this.ok('walk: on');  }
          else if (arg === 'off') { isWalking = false; this.ok('walk: off'); }
          else this.info(`isWalking: ${isWalking}`);
        },

        reset: () => {
          SM.transition(STATES.IDLE);
          hamster.group.position.set(0, 0, 0);
          hamster.group.rotation.set(0, 0, 0);
          camTargetPos.copy(DEFAULT_CAM_POS);
          camTargetLookAt.copy(DEFAULT_CAM_LOOKAT);
          PoopSystem.pellets.forEach(p => scene.remove(p.mesh));
          PoopSystem.pellets.length = 0;
          BugSystem.bugs.forEach(b => { if (b.mesh) scene.remove(b.mesh); });
          BugSystem.bugs.length = 0;
          this.ok('→ reset: idle, centered, scene cleared');
        },

        clear: () => {
          if (this._clearPending) {
            // Confirmed — wipe everything
            ['hamster_name','hamster_first_run','hamster_milestones',
             'hamster_food','hamster_total_uptime','hamster_floor_food',
             'hamster_stats','hamster_poop','hamster_damage','hamster_pos'].forEach(k => localStorage.removeItem(k));
            this.ok('all data cleared — reloading…');
            setTimeout(() => location.reload(), 800);
          } else {
            this._clearPending = true;
            setTimeout(() => { this._clearPending = false; }, 8000);
            this.err('WARNING: this will erase all saved data (name, history, uptime).');
            this.err('type  clear  again within 8 seconds to confirm, or do nothing to cancel.');
          }
        },

        name: () => {
          if (parts.length > 1) {
            const n = parts.slice(1).join(' ').trim();
            Persist.saveName(n);
            this.ok(`name set to: ${appState.userName}`);
          } else {
            this.info(`name: ${appState.userName}  |  first run: ${appState.firstRun || 'not set'}`);
            this.info(`days elapsed: ${Persist.daysSinceFirstRun().toFixed(2)}`);
            this.info(`milestones: ${appState.milestones.join(', ') || '(none)'}`);
          }
        },

        verse:  () => { Verses.speak(); this.ok('→ verse quotation'); },
        armed:  () => { Scheduler.events.find(e => e.id === 'armed_remarks')?.callback(); this.ok('→ armed remark'); },
        speak: () => { Speech.sayRandom(); this.ok('→ random utterance'); },

        say: () => {
          if (parts.length > 1) {
            Speech.say(parts.slice(1).join(' '));
          } else {
            this.err('usage: say <text>');
          }
        },
      };

      const fn = CMDS[verb];
      if (fn) fn();
      else this.err(`unknown: "${verb}"  —  type help`);
    },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 19.5 — Settings Menu
  // ═══════════════════════════════════════════════════════════════════════════

  const Menu = {
    isOpen: false,

    init() {
      document.getElementById('menu-btn').addEventListener('click', () => this.toggle());
      document.getElementById('menu-close').addEventListener('click', () => this.close());

      // Name save
      const nameSave = () => {
        const val = document.getElementById('menu-name-input').value.trim();
        if (!val) return;
        Persist.saveName(val);
        this.close();
        setTimeout(() => Speech.say(`Very well. I shall address you as ${appState.userName} from now on.`), 400);
      };
      document.getElementById('menu-name-save').addEventListener('click', nameSave);
      document.getElementById('menu-name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') nameSave();
      });

      // Food selection
      document.getElementById('menu-food').addEventListener('change', e => {
        appState.foodType = e.target.value;
        localStorage.setItem('hamster_food', appState.foodType);
        updateFoodTray();
        updateFoodPile();
      });

      // Close on backdrop click
      document.getElementById('menu-panel').addEventListener('click', e => {
        if (e.target === document.getElementById('menu-panel')) this.close();
      });

      // Clear data — two-step confirmation
      const clearBtn     = document.getElementById('menu-clear');
      const clearConfirm = document.getElementById('menu-clear-confirm');
      const clearYes     = document.getElementById('menu-clear-yes');
      const clearNo      = document.getElementById('menu-clear-no');
      clearBtn.addEventListener('click', () => {
        clearConfirm.style.display = 'block';
        clearBtn.style.display     = 'none';
      });
      clearYes.addEventListener('click', () => {
        ['hamster_name','hamster_first_run','hamster_milestones','hamster_food','hamster_total_uptime','hamster_floor_food']
          .forEach(k => localStorage.removeItem(k));
        location.reload();
      });
      clearNo.addEventListener('click', () => {
        clearConfirm.style.display = 'none';
        clearBtn.style.display     = '';
      });

      // Esc key opens/closes this menu (when dev console is not open)
      window.addEventListener('keydown', e => {
        if (e.key === 'Escape' && !DevConsole.isOpen) {
          e.preventDefault();
          this.toggle();
        }
      });
    },

    open() {
      this.isOpen = true;
      document.getElementById('menu-name-input').value = appState.userName;
      document.getElementById('menu-food').value = appState.foodType;
      document.getElementById('menu-panel').classList.add('open');
      document.getElementById('menu-name-input').focus();
    },

    close() {
      this.isOpen = false;
      document.getElementById('menu-panel').classList.remove('open');
      // Reset clear-confirm state
      document.getElementById('menu-clear-confirm').style.display = 'none';
      document.getElementById('menu-clear').style.display         = '';
    },

    toggle() { this.isOpen ? this.close() : this.open(); },
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SECTION 20 — Init
  // ═══════════════════════════════════════════════════════════════════════════

  function showNamePrompt() {
    const overlay = document.getElementById('name-prompt');
    const input   = document.getElementById('name-input');
    const button  = document.getElementById('name-submit');
    overlay.classList.remove('hidden');
    setTimeout(() => input.focus(), 80);

    const submit = () => {
      const name = input.value.trim();
      if (!name) return;
      Persist.saveName(name);
      overlay.classList.add('hidden');
      setTimeout(() => {
        const greetings = [
          `I have been waiting for you.`,
          `At last. I was beginning to wonder.`,
          `Good. Now we may begin.`,
          `I am glad you are here. I have things to tell you.`,
        ];
        Speech.say(greetings[Math.floor(Math.random() * greetings.length)]);
      }, 1500);
    };

    button.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  function init() {
    Persist.load();
    initScene();
    initHamster();
    PoopSystem.init();
    PoopSystem.loadSaved();
    FloorFood.loadSaved();
    FloorDamage.loadSaved();
    Persist.loadPosition();
    initUI();
    setupScheduler();
    DevConsole.init();
    Speech.init();
    Menu.init();
    updateFoodTray();
    updateFoodPile();
    updateStatusDot();
    // Unlock Web Audio on first interaction (browser autoplay policy)
    window.addEventListener('pointerdown', () => Sounds.unlock(), { once: true });
    // Save uptime + position every 60s and on page close
    setInterval(() => { _saveUptime(); Persist.savePosition(); }, 60_000);
    window.addEventListener('visibilitychange', () => { if (document.hidden) { _saveUptime(); Persist.savePosition(); } });
    window.addEventListener('pagehide', () => { _saveUptime(); Persist.savePosition(); });

    // Returning users get a pace boost so events catch up after absence
    _paceAutoInitial = localStorage.getItem('hamster_name') ? 4.0 : 1.0;
    _paceAutoStart   = Date.now();

    if (!localStorage.getItem('hamster_name')) {
      showNamePrompt();
    } else {
      Milestones.check();
      // Greet returning user
      const greetings = [
        `I have been expecting you.`,
        `You have returned. Good.`,
        `Ah. There you are. I have been waiting.`,
        `Good. You are here. There is much I need to tell you.`,
      ];
      setTimeout(() => Speech.say(greetings[Math.floor(Math.random() * greetings.length)]), 4000);
    }

    requestAnimationFrame((ts) => { lastTS = ts; mainLoop(ts); });
  }

  init();
  </script>
</body>
</html>
